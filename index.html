ation.\nBeing empathetic allows us to see beyond our own biased assumptions.\nWe should all realise that being empathetic doesn't mean agreeing with them, it means understanding what they may be feeling."},{"word":"crowd-pleaser","type":"n","meaning":"- If you describe a performer, politician, or sports player as a crowd-pleaser, you mean they always like to please their audience. \n- You can also describe an action or event as being a crowd-pleaser.","example":"Kody's homemade pizza is always a crowd-pleaser at family gatherings.\nEven though Jeff has told it over a thousand times, the joke is such a crowd-pleaser he just can't pass up the chance to use once it.\nAdding a Q&A session at the end of your presentation will surely prove to be a crowd-pleaser for the participants.\nRefreshing and sweet, yuzu sorbet is always a crowd-pleaser to clense your palate between dishes."},{"word":"indifferent","type":"adj","meaning":"- if you accuse someone of being indifferent to someone or something, you mean that they have a complete lack of interest in it or them","example":""},{"word":"over-reaching","type":"v","meaning":"- if you say that someone overreaches themselves, you mean that they fail at something because they are trying to do more than they are actually able to do.","example":""},{"word":"unprecedented","type":"adj","meaning":"- if something is unprecedented, it has never ever happened before ... it's a first!","example":"The heat we have been experiencing this summer is unprecedented."},{"word":"influx","type":"n","meaning":"- when there is an influx of people or things into a place ... it shows their arrival there in extremely large numbers","example":"The influx of foreign tourists in Kyoto is causing overtourism."},{"word":"coin","type":"v","meaning":"- If you coin a word or a phrase, you are the VERY first person to say and use it.","example":"The term \"overtourism\" was coined in 2016 by the travel industry news platform Skift.\nPaul tried to coin a fancy catchphrase, but even he couldn't remember it 10 minutes later.\nSteven coined a phrase he swears will catch on like fire, and we all agreed to just let him dream on.\nCharlie coined the term \"FOROOS\" revealing his inner most \"Fear Of Runnning Out Of Snacks\"!"},{"word":"municipalities","type":"n","meaning":"- it's a city's or town's local government","example":"The municipality has decided to invest in setting Wifi networks in the city's major tourist locations."},{"word":"flock","type":"n\nv","meaning":"- a flock of birds, sheep, or goats is a big group of them\n-  you can also refer to a group of people or things as a flock of them to emphasise there are a lot of them\n- to flock to a place refers to a group of people going somewhere, because it's an interesting place to go","example":"SNS can be like a flock of birds, swirling around a place ... as they are so busy going left and right, with no real intent, it seems."},{"word":"tucked away","type":"pv","meaning":"- if something or somewhere is tucked away, the place is well-hidden in a quiet place, usually where very few people go","example":"The politician had a lot of rice tucked away in his storehouse. It was par for the course, according to him ..."},{"word":"photogenic","type":"adj","meaning":"- its someone or something that looks very nice in photographs","example":"My family always compliments each other on who is the most photogenic, and those who are praised never feel happy."},{"word":"draw","type":"v","meaning":"- To draw something means to choose it or to be given it as a part of the game; lottery or competition.\n- When something, such as a film or an event draws a crowd or a lot of people, it is so interesting or entertaining that a lot of people really want go to it.\n- To draw something or someone in a particular direction; to move them in that direction, usually pulling them gently.","example":"Chiben Wakayama High School drew the lot for giving the player's oath at Koshien for two consecutive years in a row.\nSpain have drawn the Japanese team in the first round of the Quarterfinals.\nAlbert drew his chair next to mine, so we could discuss the matter quietly.\nThe creepy guy tried to put his arm around the young girl's shoulderrs and draw her closer to him, so she bit his hand."},{"word":"serenity\nserene","type":"n\nadj","meaning":"- to be calm and quiet\n- to be tranquil and peaceful","example":"Jeff's joke has serenity. It always has a powerful effect of quieting the entire surroundings."},{"word":"ambiance\nambience","type":"n","meaning":"- The ambience of a place is the character, mood and/or atmosphere that the place seems to have.","example":"I love the ambience of the room ... right before rolling the 3 dice.\nThe cosy cafe's warm and relaxing ambiance makes it easy to stay much longer than planned.\nSoft or bright lighting completely changes the ambiance of a room, instantly.\nThe results affirmed that a serene ambiance in the office can help everyone stay focused for longer."},{"word":"evoke","type":"v","meaning":"- To evoke a particular memory, idea, emotion, or response means to cause it to occur, or to bring it up again.","example":"Aiden occasionally evokes a memory of being approached by a police officer at Pachinko parlour, so long ago.\nThe smell of fresh bread always evokes wonderful memories of my grandmother's kitchen.\nHis engaging presentation style evokes strong support from the audience.\nA single image can evoke more meaning than a hundred words."},{"word":"cite","type":"v","meaning":"- If you cite something, you quote it or mention it, especially as an example or proof of what you are saying.","example":"AI can be seen as an accumulation of cited matters.\nSeymour loves to cite \"research\" which is awe-inspiring considering he never actually reads anything other than 'manga'.\nDon cited the response as being \"common sense\", which is ironic, as he wasn't using any himself.\nLillian could cite just about every movie quote at the drop of a hat, except for the one she actually needed at that moment."},{"word":"resemble","type":"v","meaning":"- if one thing or a person resembles another, they are similar to each other - in looks or personality","example":"Kassidy and Aiden resemble each other as they are both happily henpecked husbands."},{"word":"be fed up with","type":"idiom","meaning":"- To be annoyed; bored or frustrated by someone or something, that you've experienced for far too long.\n- It's something that you can no longer tolerate or find unacceptable.","example":"I am fed up with summer being over 35 degrees, for too many days in a row.\nAllan had become fed up with a hectic city life, so he took off to the countryside for some peace and quiet.\nI'm just so fed up with everything, I've no idea what to do with my life!\nThey expelled Don from the group, as they became fed up with his constant shameless actions."},{"word":"quarrel","type":"n","meaning":"- when two or more people quarrel, they have an angry argument\n- to verbally fight with someone about something they disagree on","example":"I'm fed up with the recent style of campaigning. These days, election campaigns are just quarrels."},{"word":"nuisances","type":"n","meaning":"If you say someone or something is a nuisance, you mean that they annoy you or cause you a lot of problems.","example":"Don't say someone's positive action is a nuisance in the workplace. It's the fastest way to start a quarrel and break the serenity of the group!"},{"word":"dampen","type":"v","meaning":"- To dampen something, such as someone's enthusiasm or excitement, means to make it less lively or intense for them.\n- To reduce the energy or tension of someone or something in a disaappointing way.","example":"It is necessary to examine whether working from home dampens our enthusiasm for work or not. I believe we can differentiate between the two working environments.\nScott & Mary tried to dampen their excitement, but their smiles kept slipping through as the game came closer to the end.\nThe dreadful news didn't dampen their honeymoon plans; they went ahead with them anyway.\nA good facilitator should always use a calm and steady tone to dampen any conflict or tension in the room."},{"word":"best-preserved","type":"adj","meaning":"- If you describe a middle-aged or old person as being well-preserved, you mean that they look good for their age.\n- It's something or someone that still looks new or young in appearance.\n- It someone or something that hasn't grown old nor looks worn-out or run-down.","example":"Daio Cedar is the best-preserved Yaku Cedar on Yakushima Island.\nThe tour guide showed us some of the best-preserved temples from the early 900s.\nThe entire community felt the castle should protected to keep it as the area's best-preserved site, at all costs.\nSuddenly hearing the melody, once again, felt like the best-preserved memory of their childhood."},{"word":"preserve","type":"v","meaning":"- if you preserve a situation or a condition, you make sure that it remains as it is, and it does not change or end\n- it is to keep something in the same condition","example":"Even for Ness, it's difficult to preserve her eternal beauty. Ha! Ha! However, she hopes her spirit will live on in the minds of many ... preserving her legacy forever!?"},{"word":"differentiate","type":"v","meaning":"- To differentiate between things or if you differentiate one thing from another, you recognise or show the difference between them.\n- To show two or more things are different.","example":"Aiden differentiates sticks when playing as a foward and when playing as a defender in ice hockey.\nOur ads are aimed to differentiate products and outdo your competitors.\nClearly Pam cannot differentiate between real news and fake news, as her boss prefers the later.\nIt's almost impossible to differentiate the twins - they really are identical!"},{"word":"reluctant","type":"adj","meaning":"- if you are reluctant to do something, you are unwilling to do it and hesitate before doing it, or do it slowly and without any enthusiasm","example":"Many children are reluctant to do their summer homework, until the very last minute."},{"word":"revise","type":"v","meaning":"- if you revise the way you think about something, you adjust your thoughts, usually in order to make them better or more suited to how things are","example":"The spartan 10 rules have been revised and improved, by Ness & Jeff."},{"word":"advocate","type":"v","meaning":"- To support or recommend someone or something (esp, an action) publicly\n- To plead for or speak (out/up) in favour of someone","example":"The Minister of Agriculture, Forestry and Fisheries has confidently adovocated that stockpiled rice is delicious.\nThe foreign journalist demonstrated admirable rigour in advocating immigrants basic human rights.\nSpeaking to the board, the manager strongly advocated the new proposal reflects an admirable level of detail and foresight."},{"word":"contradictive\ncontradict","type":"adj\nv","meaning":"- Tending to or inclined to be a contradiction.\n- To say that what they have just said is wrong or different.\n- To suggest that it's wrong by saying something different.","example":"The report contained several contradictive statements that need clarification.\nThe Presdient always talks in circles, frequently contradicting himself,  with the intent of trying to redirect everyone's attention.\nThe images on the telly completely contradicts every one of his claims that he has the upper hand in the situation.\nScarlet's way of life totally contradicts her so-called beliefs on being righteous."},{"word":"tag/ tagging","type":"n","meaning":"-\"Tag/ Tagging\" is writing a stylized signature or symbol on a surface","example":"He's tagging while dozing off in class."},{"word":"hell bent on","type":"idiom","meaning":"-The phrase \"hell-bent on\" means being extremely determined to do something, often with a sense of recklessness or stubbornness.","example":"She’s hell-bent on becoming a professional dancer, even if it means dropping out of school."},{"word":"scrawling","type":"n","meaning":"-Scrawling refers to the act of writing something quickly and often illegibly.","example":"He was scrawling notes on a napkin during the meeting."},{"word":"Masonic","type":"adj","meaning":"-The word \"Masonic\" refers to anything related to Freemasonry, which is a fraternal organization that traces its origins to the local fraternities of stonemasons in the late 16th to early 17th centuries.","example":"A Masonic lodge → a meeting place for Freemasons.\nMasonic symbols → such as the square and compass, often associated with Freemasonry.\nMasonic rituals → ceremonies and traditions practiced by members."},{"word":"nifty","type":"adj","meaning":"-Clever, stylish, or useful in a neat way","example":"The app has some nifty features for organizing your tasks."},{"word":"corbillat","type":"n","meaning":"-The word \"corbillat\" is a French noun that refers to the young of a raven — in other words, a baby raven.\n- A young crow or raven.","example":"Just like corbillat, we've never seen baby pigeons either.\nThe corbillat hopped along the fence, its feather still soft with youth."},{"word":"persist","type":"v","meaning":"-The word \"persist\" is a verb that means to continue firmly or obstinately in a course of action, belief, or effort, especially in spite of difficulty or opposition.","example":"If you persist, you’ll eventually succeed on gambling. The rumor of \"LivLA\" persisted among \nthe Con & Con menbers."},{"word":"ugly","type":"adj","meaning":"-The word \"ugly\" is an adjective that means unpleasant to look at, or more broadly, unpleasant in character, behavior, or situation.","example":"The boss made an ugly face for Jeff's unenthusiastic remarks. Why are his wearisome remarks so unavoidable?\nIt's undesirable to have an ugly face prying into your private life ... as social media does ... isn't it?"},{"word":"confess","type":"v","meaning":"- To admit to (doing) something, especially something that may be considered as being wrong, secret, or embarrassing.","example":"Aiden often confesses his youthful cheeky mistakes to this group, without any concern for repercussions.\nRaymond claimed that he was coerced into confessing and that he was actually innocent.\nMelissa confessed at being hopeless when it comes to remembering a lot of info.\nThe minister asked the man candidly, \"Do you come to church to confess your sins or just savour the wine?\""},{"word":"nurturing","type":"adj\npart of a verb phrase","meaning":"-Nurturing refers to the act of caring for, supporting, or encouraging growth and development, especially in a gentle and compassionate way.","example":"She has a nurturing personality. He is nurturing his team to become future leaders."},{"word":"streak","type":"n","meaning":"- Common Meanings of \"Streak\":1. A long, thin mark or line  2. A continuous period of success or failure 3.A characteristic or tendency 4.To move quickly (as a verb)","example":"There was a streak of paint on the wall. He broke his losing streak with a surprise victory. \nHe has a stubborn streak. He streaked across the field."},{"word":"rebellious","type":"adj","meaning":"-The word \"rebellious\" describes someone or something that resists authority, control, or tradition. It often implies a desire to challenge rules, norms, or expectations.","example":"She has a rebellious streak and often challenges the status quo. The artist’s work is rebellious, rejecting traditional techniques."},{"word":"territorial","type":"adj","meaning":"The word \"territorial\" refers to a strong sense of ownership or control over a particular area, space, or domain.","example":"Someone who is territorial may be protective or possessive about their personal space, belongings, or \nrelationships. Kassidy is very territorial regarding the Osaka area."},{"word":"scribblle","type":"adj","meaning":"-The word \"scribble\" means to write or draw something quickly and carelessly, often making it messy or hard to read. It’s commonly used when someone is jotting down notes, doodling, or writing without much attention to neatness.","example":"She scribbled a phone number on the back of a receipt."},{"word":"dialect","type":"n","meaning":"- A particular form of a language that is specific to a region, group, or community. \n- It includes differences in vocabulary, grammar, and pronunciation from the standard version of the language.","example":"I can speak the dialects of Kyushu, Kansai, and Hokkaido, and I'm even pretty good at English.\nLinguists often analyse dialects to understand cultural and historical shifts in the region.\nThe marketplace in Bombay buzzed with so many dialects, as each voice carried a different rhythm of wherever they called home."},{"word":"decay\ndecaying","type":"n\nadj","meaning":"-The process of gradual decline, decomposition, or deterioration of something over some time.\n- Something that is rotting or in gradual decline.","example":"Some argue that corruption is a sign of moral decay in politics. \nThe fruit began to decay after being left out for days.\nThe groound was scatterd with the decaying leaves, as the old lady hadn't been out to rake them up for over a week.\nThe newspaper's headline boldly declared, \"The last thing our decaying democracy need is less choice\"."},{"word":"pent-up","type":"n","meaning":"-The word \"pent-up\" describes emotions or energy that have been held inside for a long time and are not expressed openly. These feelings often build up over time and may eventually burst out. Repressed or restrained emotions, especially anger, frustration, or excitement.","example":"He finally exploded with all his pent-up anger. She had pent-up excitement before the big performance. His pent-up urge to pee turned him into the highway star."},{"word":"prosecute","type":"v","meaning":"-The word \"prosecute\" generally means to take legal action against someone for a crime or wrongdoing, especially in a court of law. To officially charge someone and try them in court. To carry out or pursue something (like a plan or activity).","example":"Banksy might be prosecuted for graffiti on the Ministry of Justice wall."},{"word":"doodle","type":"v","meaning":"- To draw or sketch casually, often without much thought or planning - usually while distracted or thinking about something else. \n- A quick, simple, and often spontaneous drawing.","example":"She doodled flowers in the corner of her notebook during class. \nHis notebook was full of random doodles and scribbles.\nNot a masterpiece by any means of the imagination, the doodle still sold for just over a million dollars.\nEveryone knows he's such a doodle, but they were disgusted that Johnnie actually likes to doodle his distorted doodle."},{"word":"fair & square","type":"idiom","meaning":"- It means something was done honestly, without cheating, and in a straightforward manner.\n- \"Fair\" implies with justice, honestly, and with equality.\n- \"Square\" in this context reinforces the idea of being direct, upright, and without deception.","example":"It's evident the Dodgers will win the World series fair and square, again.\nLiz and Marissa won the game fair and square, so no one could complain.\nTo settle the argument fair and square, why don't we toss a coin?\nThe diligent team worked excessive hours to secure the deal fair and square, without any special favours."},{"word":"walking a tightrope","type":"metaphor","meaning":"The phrase \"walking a tightrope\" is a metaphor that means being in a very delicate or risky situation, where one must be extremely careful to avoid failure or trouble.","example":"He's walking a tightrope between keeping costs down and maintaining quality."},{"word":"accuse","type":"v","meaning":"- To say that someone has done something wrong or illegal, often before it has been proven.","example":"She was accused of stealing company funds.\nI'm not accusing you of anything; I just want to get to the bottom of things.\nJen accused Charles of taking her charger without asking.\nMany of the employees are accusing the manager of violating workplace policies."},{"word":"turn ... in","type":"","meaning":"The phrase \"turn ... in\" means to report someone to the authorities, or to hand someone or something over, usually in a formal or official way.","example":"He turned them in for stealing.\nPlease turn in your report by Friday."},{"word":"clash","type":"n\nv","meaning":"The word \"clash\" can be used both as a noun and a verb.\n- It generally refers to a conflict, disagreement, or violent encounter with someone.\n- To fight; argue; strongly disagree with someone - usually loudly.","example":"There was a clash between management and staff, over the new radical policies being enforced against everyone's wishes.\nThe two teams clashed over strategy.\nA group of civilians clashed with the ICE agents over terrorizing women and children in town.\nIt's hard to feel empathy and not clash with someone who doesn't have any sense of integrity or morals."},{"word":"flatter","type":"v","meaning":"The verb \"flatter\" means to praise someone excessively or insincerely, often to gain favor or manipulate.","example":"He flattered his boss to get a promotion.\nShe was flattered by the kind words."},{"word":"inadvertently","type":"adv","meaning":"The adverb \"inadvertently\" means without intention, or accidentally. It describes something that happens without planning or awareness, often with unintended consequences.","example":"She inadvertently deleted the file.\nJeff inadvertently offended his boss."},{"word":"drain\ndrained","type":"v\nadj","meaning":"- To remove a liquid or something from an object or a place - causing it to flow elsewhere.\n- A state of being completely exhausted - either physically, mentally, or emotionally.","example":"After the Con & Con class, Kassidy will be completely drained from handling all the questions about his remarks.\nThe new assistant looked drained after dealing with so many errands for her boss before lunch.\nThe hikers didn't realise how drained they were until they finally stopped for a rest.\nAs she strolled between the centuries old lanterns, soaking up the stillness, all of her stress and worries was drained from her."},{"word":"craving\ncrave","type":"n\nv","meaning":"- A strong desire or longing for something, often something specific like food, attention, or an experience.\n- To want or have something very, very much.","example":"We all have a craving for yummy Wagyu beef paired with an elegant Pinot Noir.\nThe members all had a craving for something sweet after the long MTG.\nRaymond gets a craving for ramen every time he goes on a business trip.\nHumans are often driven by a craving for love as much as they crave money."},{"word":"solitude","type":"n","meaning":"The word \"solitude\" refers to the state of being alone, often by choice, and usually in a peaceful or reflective way.","example":"He enjoys the solitude of early mornings."},{"word":"a sweet spot","type":"n","meaning":"- The phrase \"a sweet spot\" refers to the ideal or most effective point or condition in a situation — where everything works best, feels right, or delivers optimal results.","example":"We found the sweet spot between cost and quality.\nKassidy hit the ball right on the sweet spot of his racket, for the winning shot of the match.\nWe managed to find a sweet spot in our schedules where everyone could meet up for a delightful drop or two."},{"word":"tact","type":"n","meaning":"The word \"tact\" refers to the ability to say or do things in a way that doesn’t offend or upset others, especially in sensitive situations. It’s a key skill in communication, leadership, and diplomacy.","example":"She handled the criticism with tact.\nHe lacks tact when giving feedback."},{"word":"distant","type":"adj","meaning":"- Something that's far away, either physically, emotionally, or in time.","example":"The mountain is distant on the horizon.\nHe seemed distant during the meeting, as his tummy growled loudly, we realised it was time for lunch.\nIn the distant future, technology may evolve further to a point where we no longer have bodies.\nThe goal still feels quite distant, yet I believe we're making steady progress, in the right direction."},{"word":"fatherly","type":"adj","meaning":"used to describe a man or male behaviour typical of a kind and loving father","example":"fatherly advice"},{"word":"resonate","type":"v","meaning":"(of an idea or feeling) to have particular meaning or importance for someone; to affect or influence someone deeply","example":"I resonate with Yoshinobu's pitching style and willpower."},{"word":"astronomical","type":"adj","meaning":"- Connected with the scientific study of stars, planets, and space.","example":"Astronomical telescopes are used to observe distant galaxies.\nThe astronomical company paid an astronomical sum for their new headquarters, to be located on the Moon."},{"word":"intensifying","type":"v/adj","meaning":"To become or make something stronger or more extreme.Used in continuous tenses or as a modifier.Describes something that is becoming more intense.","example":"Her drinking has been intensifying evry year.\nThere is an intensifying debate over climate policy."},{"word":"reap","type":"v","meaning":"To cut and gather a crop, especially grain, from a field.\nTo receive or obtain something as a result of your own actions.","example":"Farmers reap the wheat in late summer.\nShe reaped the benefits of years of hard work."},{"word":"a delightful drop","type":"n","meaning":"- A colloquial expression meaning “a very pleasant drink”, usually alcoholic, such as wine, whiskey, or beer.Common in British and Australian English, where “drop” informally refers to a small amount of alcohol or a single serving.","example":"After work, we enjoyed a delightful drop at the local bar.\nAlbert poured everyone a delightful drop of Chardonnay that he had picked up on his trip to Yoichi city.\nThe dessert had a delightful drop of rum that really brought the rich flavour out."},{"word":"fittingly","type":"adj","meaning":"Fittingly means “in a way that is appropriate, suitable, or proper for the situation.","example":"She was fittingly honored for her years of service.\nThe ceremony ended fittingly with a moment of silence."},{"word":"rural","type":"adj","meaning":"Rural refers to areas that are in the countryside rather than in towns or cities.","example":"She grew up in a rural village surrounded by mountains."},{"word":"undergoing","type":"v","meaning":"The verb undergo means to experience or be subjected to something, typically a process, change, or treatment.So undergoing is the present participle form, used when something is happening now or continuously.","example":"She is undergoing treatment for cancer.\nThe company is undergoing a big change."},{"word":"key figure","type":"n","meaning":"An important person in a particular situation, organization, or event.\nAn important number or statistic that represents essential information.","example":"The report highlights key figures such as profit margins and growth rates.\nShe became a key figure in the movement for social change."},{"word":"phenomenal","type":"adj","meaning":"Extraordinary, remarkable, or exceptional in quality or degree.\nSomething that is very impressive or amazing.","example":"Aiden has a phenomenal icehocky skill  within  the old timer league."},{"word":"revolved around","type":"v","meaning":"If something revolves around a particular subject, person, or idea, it means that it is the main or most important feature of that thing, and everything else is connected to it.","example":"The discussion revolved around the budget for next year.\nJeff’s life revolved around his boss."},{"word":"embark on","type":"v","meaning":"- To start something, especially something new, difficult, or exciting","example":"Liz was embarking on a world of wealth, with Charles Headleand. (???)\nBy reporting illegal immigrants to the city council we're pushing them to embark on a path of petty theft and trouble, just to avoid being found.\nThe company is expected to embark on major restructuring initiatives early next year.\nBefore we embark on this quiet journey through the misty forest, please remember to leave nothing behind other than footprints."},{"word":"temperamental","type":"adj","meaning":"likely to suddenly become upset, excited, or angry","example":"Jo's car is very temperamental in the mornings."},{"word":"savoury","type":"adj","meaning":"Having a salty or spicy taste rather than a sweet one; pleasant and full of flavor.","example":"I prefer savoury snacks like Kakipee and crackers to sweet ones."},{"word":"severe","type":"adj","meaning":"Very intense, serious, or harsh in degree or effect.\nIt can describe weather, pain, punishment, conditions, or situations that are extreme or strict.","example":"The region experienced severe flooding after the storm.\nThe company faces severe financial difficulties."},{"word":"nurture","type":"n/v","meaning":"The process of caring for and encouraging growth or development.\n To care for and encourage the growth or development of someone or something.","example":"A child needs both nurture and discipline.\nThe company aims to nurture innovation among its employees."},{"word":"surge","type":"v","meaning":"To move suddenly and powerfully forward or upward; to increase suddenly and strongly.","example":"Electricity demand surged during the heatwave.\nPrices have surged in recent months due to inflation."},{"word":"an exemption for","type":"","meaning":"- A special permission NOT to do or pay something that others are required to do or pay.","example":"The company applied for an exemption for certain environmental regulations.\nHe was granted an exemption for military service due to health issues."},{"word":"things are looking up for","type":"","meaning":"If things are looking up for someone or something, it means the situation is improving or becoming more favorable.","example":"Things are looking up for the company after a tough year.\nWith the economy recovering, things are looking up for small businesses."},{"word":"lament","type":"n/v","meaning":"To express grief, sorrow, or regret about something.","example":"She lamented the loss of her childhood home.\nHe lamented that he didn’t take the opportunity earlier."},{"word":"thrive","type":"v","meaning":"- to grow, develop, or succeed vigorously and healthily\n- often used for people, businesses, plants, or communities that do very well under certain conditions","example":"Plants thrive in sunlight and rich soil.\nHer business thrived after adopting new technology.\nChildren thrive when they receive love and support."},{"word":"showcasing","type":"v","meaning":"to show the best qualities or parts of something","example":"The Venice Film Festival has always been the showcase of Italian cinema."},{"word":"prone to","type":"pv","meaning":"Likely to suffer from, experience, or do something, especially something undesirable.","example":"prone to forget things,prone to accidents,prone to follow trends\nHe is prone to sleep at the bar."},{"word":"remains at hand","type":"","meaning":"Something that continues to be easily accessible or available for use.","example":"The necessary documents remain at hand for quick reference.\nEnsure that safety equipment remains at hand during the operation."},{"word":"evidently","type":"adv","meaning":"- In a way that is clearly seen or understood; obviously; apparently.","example":"She was evidently upset by the news and frustrated by not being able to do anything to rectify the problem.\nHe is evidently a talented hockey player with the knack of being a real crowd-pleaser.\nEvidently they are an amazing team with a remarkable knack for engaging the crowd.\nEvidently, she is discontented with the feeble attitude of those who show no concern for anyone other than themselves."},{"word":"stems from","type":"","meaning":"To originate from or be caused by something.","example":"His problems stem from a lack of confidence.\nThe conflict stems from a misunderstanding between the two parties."},{"word":"perilous","type":"adj","meaning":"Very dangerous or risky; full of peril.\nIt describes situations, actions, or conditions that involve serious danger or uncertainty.","example":"They embarked on a perilous journey through the mountains.\nCrossing the river during the storm was a perilous task.\nThe company is in a perilous financial position."},{"word":"reaffirms","type":"v","meaning":"to formally state an opinion, belief, or intention again, especially when someone has questioned you or expressed a doubt","example":"The participating States reaffirm that freedom of expression is a human right and a basic component of a democratic society."},{"word":"incidents","type":"n","meaning":"Multiple events or occurrences, often referring to unexpected or problematic situations.","example":"There were several incidents during the festival.\nThe incident caused a temporary shutdown of the system."},{"word":"hearty","type":"adj","meaning":"Warm, enthusiastic, and friendly in manner or feeling.Large, strong, or satisfying in amount—especially of food.","example":"She gave me a hearty welcome.\nWe enjoyed a hearty meal at Casalinga."},{"word":"fussy","type":"adj","meaning":"Being very concerned about or picky with details; hard to please because of many small preferences or demands.Overly elaborate, complicated, or decorated in a way that seems unnecessary.","example":"She is fussy about what she eats, always checking every ingredient.\nThe design of the room looks too fussy with all those decorations.\nThe Boss is fussy about saying \"Gucha-Gucha\"."},{"word":"digest","type":"v","meaning":"- To break down food in the stomach and intestines so the body can use it.\n- To understand and absorb information or ideas slowly over time.","example":"It takes several hours to digest a meal, properly.\nThis report is long - please give me at least a decade to digest all the information.\nI found the book was easy to digest, even for a beginner like me.\nI reckon most people need some space & time to digest complex emotions."},{"word":"wholesome","type":"adj","meaning":"Good for your physical or mental health; promoting well-being.Morally good, clean, or innocent in a way that makes people feel comfortable or happy.","example":"She prepares wholesome meals using fresh vegetables.\nThe movie is funny, sweet, and completely wholesome."},{"word":"sustain","type":"v","meaning":"To keep something going or maintain it over time; to continue or support something so it does not stop or weaken.To provide what is needed for something to exist or survive.","example":"We need to sustain Con & Con if we want to work abrord someday.\nThe village is sustained by farming and fishing.\nThe building sustained minor damage in the storm."},{"word":"accommodate","type":"v","meaning":"- To provide space or room for someone or something.\n- To do something helpful for someone; to meet someone's needs.\n- To adjust or change something to fit a new situation or need.","example":"The hotel can accommodate up to 500 guests.\nWe will do our best to accommodate your request, given enough time.\nThe system can be adjusted to accommodate different users, by adjusting the setting, here."},{"word":"support","type":"v/n","meaning":"To help or assist someone or something, especially in difficult situations.\nThe act of providing money, resources, or strength.","example":"My friends supported me when I was going through a hard time.\nThe team received financial support from the government."},{"word":"concern","type":"n","meaning":"- A feeling of worry or anxiety about a situation or something.\n- Something that is important to you or affects you, but makes you worry.","example":"We have serious concerns about the safety of the building. The foundation may crumble from even a slight tremour.\nThere are growing concerns over the rapidly rising prices of petrol.\nThe group voiced their concerns, but the bureaucrats seemed to self-absorbed to listen to any of them.\nAlize addressed the client's concerns calmly, giving a clear and detailed explanation for the occurrence."},{"word":"interact","type":"v","meaning":"To communicate or work together with someone or something.To affect and influence each other when two or more things come together.","example":"I enjyoy interacting with Con & Con menbers.\nThe chemicals interact when mixed together."},{"word":"regrettably","type":"adv","meaning":"In a way that makes you feel sorry or disappointed; unfortunately.","example":"Regrettably, we had to cancel the meeting due to bad weather.\nRegrettably, we couldn't rescue Jeff from his Boss's command."},{"word":"devote","type":"v","meaning":"- To give your time, effort, or attention to something or someone because you believe it is important.\n- To use a particular amount of money, energy, or resources for a specific purpose.","example":"She devoted her life to helping others.\nAiden devoted much of his time to play Pachinko in his younger days.\nThe whole crew willingly devoted their weekend to helping their friend move.\nLisa devotes her rainy days to performing quiet rituals, like sipping tea; staying cosy and enjoying a good read."},{"word":"pagan","type":"n/adj","meaning":"A person who follows a religion that is not one of the major monotheistic religions (such as Christianity, Islam, or Judaism), often involving many gods or nature worship.Related to or characteristic of such religions or belief systems.","example":"She studies how pagans in Europe celebrated seasonal festivals.\nThey performed a pagan ritual to celebrate the harvest."},{"word":"intent","type":"n","meaning":"A purpose, plan, or reason behind an action; what someone aims to do.","example":"Her intent was to help, not to criticize.\nHe left early with the intent of catching the first train."},{"word":"at all costs","type":"phrase","meaning":"- No matter what the difficulties; risks; costs; or sacrifices involved are; it should be done.\n- By any means required.\n- If something should be avoided at all costs, then it must NOT occur, for any reason.","example":"We must protect the environment at all costs.\nWe must maintain integrity at all costs.\nThe stolen paintings must be recovered at all costs.\nEveryone knew the war should be avoided at all costs, however the maniac went ahead without any diplomacy."},{"word":"otherwise","type":"adv","meaning":"Used to say what will happen if something does not happen or is not done.Used to describe an alternative state or situation.","example":"You need to submit the form today; otherwise, your application will be delayed.\nPlease follow the guidelines; otherwise, the system may not function properly."},{"word":"things have taken a turn for the worst","type":"","meaning":"A situation begins to become worse; something starts to go in a negative direction.","example":"Things have taken a turn for the worse since the new policy was introduced.\nThe weather was fine, but it took a turn for the worse in the afternoon."},{"word":"coerce","type":"v","meaning":"- To force someone to do something that they don't want to do, by using pressure, threats, or intimidation.","example":"Jeff was coerced to agree, even though he didn’t want to.\nThe employees claimed they were coerced into working overtime.\nThe manager repeatedly emphasised that no one should ever feel coerced into working overtime.\nThe results clearly indicated how social pressure can coerce individuals into conformity."},{"word":"insistent","type":"adj","meaning":"Continuing to demand something; not willing to change your opinion or stop asking.Saying something firmly and repeatedly.","example":"Ness was insistent that allways camera on! \nMy dog gets insistent when he wants to go outside."},{"word":"abide by","type":"phrasal verb","meaning":"- To accept and follow a rule, decision, agreement, or law.","example":"You must abide by the rules of the game.\nAll employees are expected to abide by the company’s policies.\nIf you stay here, you need to abide by our house rules.\nThe inconsiderate student was expelled from school, as they constantly caused havoc and refused to abide by the rules."},{"word":"pull it off","type":"phrasal verb","meaning":"To succeed in doing something difficult or unexpected.","example":"I didn’t think he could do it, but he pulled it off.\nIt seems to be difficult to sleep standing up, but Albert pull it off."},{"word":"taken aback","type":"idiom","meaning":"To be very surprised or shocked by something, usually in an unexpected way.","example":"He  was taken aback by client's sudden anger.\nI was taken aback by the price—it was much higher than I thought."},{"word":"sneaky","type":"adj","meaning":"Behaving in a secretive, dishonest, or sly way, often trying to do something without being noticed.","example":"Don’t be so sneaky—just ask if you want something.\nHe made a sneaky change to the document without telling anyone."},{"word":"a victim of these circumstances","type":"","meaning":"- This is someone who is negatively affected by a situation that they did not cause and cannot control.","example":"He became a victim of these circumstances when the company suddenly shut down.\nWe’re all victims of these uncertain circumstances, so we need to support each other."},{"word":"partake (in)","type":"v","meaning":"To take part in an activity or event; to participate.Sometimes also: to eat or drink something.","example":"Anyone is welcome to partake in the workshop.\nWe invite our partners to partake in this initiative."},{"word":"oblige","type":"v","meaning":"To oblige someone means to be helpful to them by doing what they have asked you to do.","example":"If you need help carrying those boxes, I'd be happy to oblige.\nThe contract obliges both parties to maintain confidentiality!\nI didn't want to attend the event in the begiinniing, but I felt obliged to go, after my boss begged me on several ocassions."},{"word":"comply","type":"v","meaning":"- If someone or something complies with an order or set of rules, they are in accordance with what is required or expected.\n- To do or act as you have been told or asked to do or act.","example":"To join the workshop, all participants need to comply with the registration guidelines.\nShe swiftly adjusted her proposal to comply with her manager's feedback.\nIf you don't comply with the rules, you will be expelled from the group.\nLeon tries to comply with the rules of the game, but his streak of cheekiness keeps slipping through, disrupting the game."},{"word":"judiciouslly","type":"adv","meaning":"in a manner that shows or proceeds from good judgement","example":"The budget needs to be allocated judiciously to ensure long-term sustainability.\nPlease use this area and these tools judiciously, so everyone can have fair access to them.\nThe young man needed to choose his words judiciously, aware that a slip of the tongue could ruin their relationship forever."},{"word":"embezzle","type":"v","meaning":"- When someone embezzles money that their organization or company has placed in their care, they take it and use it illegally for their own purposes.\n- To steal money for yourself.","example":"The new regulations were enforced to try and prevent employees from embezzling client assets.\nRumours spread that the nasty brother was quietly embezzling money from his sister's pocket money.\nIf I knew how to embezzle money from Elon, I'm sure I could make the world a better place for so many people.\nThe audit revealed that both of his sons had been embezzling government funds intended for military expenditure."},{"word":"pricey","type":"adj","meaning":"If you say that something is pricey, you mean that it is expensive.","example":"They say that cafe is nice, but the desserts are a bit pricey.\nTokyo taxis can get pricey late at night, especially if they think they can take you on a wild goose chase.\nSome may say that restaurant is pricey, however if you love it, then it's worth every penny!"},{"word":"unsuspecting","type":"adj","meaning":"You can use unsuspecting to describe someone who is not at all aware of something that is happening or going to happen.","example":"Most unsuspecting tourists walk straight past some of the best hidden cafes without even noticing them.\nThe cat waited patiently, ready to pounce on any unsuspecting person walking by, scaring the daylights out of them.\nI slipped the love letter into his bag, while he remained completely unsuspecting."},{"word":"invaluable","type":"adj","meaning":"If you describe something as invaluable, you mean that it is extremely useful.","example":"Jeff's advice is always invaluable, just no one listens to him.\nYour comments and feedback have been invaluable for me.\nClear and concise documents prove invaluable when teams collaborate across time zones.\nYour support has been truly invaluable to me! I couldn't have done it without you."},{"word":"an ounce of gratitude","type":"","meaning":"- It means even a small amount of gratitude or thankfulness can have a meaningful or positive impact.\n- An ounce is a unit of weight used in Britain and the USA. \n- There are sixteen ounces in a pound and one ounce is equal to 28.35 grams.","example":"Even an ounce of gratitude can really brighten someone's entire day! Just say \"ta\"!\nA quick message with an ounce of gratitude can strengthen team relationships, tenfold.\nLeaders who show even an ounce of gratitude often create the most supportive workplaces.\nYou don't need a grand gesture; even an ounce of gratitude can shift people's perspectives, positively."},{"word":"teeny-tiny","type":"","meaning":"- If you describe something as teeny, you are emphasizing that it is very small.\n- Something that's very little or tiny.","example":"We made some teeny-tiny adjustments to the layout to improve readability.\nThe kids found heaps of teeny-tiny crabs hiding under the rocks.\nCould you please move your chair a teeny-tiny bit to the right?\nI have a teeny-tiny favour to ask you ... if you don't mind!?"},{"word":"creepy-crawly","type":"n","meaning":"- Usually insects when they give you a feeling of fear or disgust.","example":"When there's a creepy-crawly in the classroom, I make Jeff take it outside.\nThe kids screamed when a creepy-crawly scuttled across the floor in front of them.\nThe ancient shrine was quiet except for the creepy-crawlies exploring the wooden beams.\nIf you see any creepy-crawlies, please let Jeff know! He'll take care of them ........"},{"word":"intuitive","type":"adj","meaning":"If you have an intuitive idea or feeling about something, you feel that it is true although you have no evidence or proof of it.","example":"The new app is very intuitive, as it only took me a few minutes to figure out how to use it.\nShe has an intuitive sense of when someone needs her support or help.\nThe process is intuitive, however I'm happy to walk you through it.\nThe layout of the old museum felt intuitive, guiding visitors smoothly from room to room."},{"word":"chunk","type":"n","meaning":"- A thick, solid piece of something.","example":"She ripped off a huge chunk of bread and handed it to me.\nA chunk of hard snow fell from the roof during the thaw.\nA significent chunk of the budget should be allocated to English sessions.\nI only need a teeny-tiny chunk of your time, if you're free. No, sorry I'm pricey - not free!?"},{"word":"book","type":"v","meaning":"-To arrange or reserve a ticket; hotel room; table at a restaurant etc., in order to use it, at a certain time.","example":"The manager asked his assistent meekly, \"Did you book a table at my wife's favourite restaurant, for our anniversary?\"\nThe team booked a consultation to review the new system, thoroughly with experts.\nThey booked a hotel near the station to make commuting to the conference, easier.\nYou may need to book ahead, as the place tends to get really busy during peak season."},{"word":"loathe","type":"","meaning":"","example":"Who doesn't loathe waking up before sunrise in winter?\nHe absolutely loathes doing the dishes when he cooks.\nEveryone may loathe the smell of durian, however, I don't mind it at all.\nI loathe rich people who are stingy and won't dip their hands into their pockets."},{"word":"conversely","type":"adv","meaning":"","example":"He loves working early in the morning; conversely she's most productive at night.\nThe cafe is quiet on the weekdays; conversely, weekends are usually packed.\nMy sister enjoys really spicy food; conversely I loathe even mild heat.\nThe product seems affordable, conversely its maintenance costs can be quite exorbitant."},{"word":"squiggly","type":"","meaning":"","example":"A squiggly shadow slipped across the tatami mats as the lantern flickered.\nThere's a squiggly line on my notepad as the cat wanted to be patted.\nMy hair gets all squiggly when the weather is muggy."},{"word":"you've been booked","type":"","meaning":"","example":"I'm afraid you've been booked on suspicion of fraud.\nYou've been booked for trespassing, so you're lucky they didn't shoot you!\nYou've been booked on multiple charges, according to the police report."},{"word":"miffed","type":"adj","meaning":"If you are miffed, you are slightly annoyed and hurt because of something which someone has said or done to you.","example":""},{"word":"stance","type":"n","meaning":"Your stance on a particular matter is your attitude to it. Your stance is the way that you are standing.","example":"The company changed its stance after hearing the customer's brutal feedback.\nWhat is your stance on WFH? Are you for or against it?"},{"word":"foresee","type":"v","meaning":"If you foresee something, you expect and believe that it will happen.","example":"It’s hard to foresee what country will win the WBC, as all of the contenders are strong and well-prepared.\nI didn’t foresee this problem occurring. It just came at us out of the blue."},{"word":"compel","type":"v","meaning":"- If a situation, a rule, or a person compels you to do something, they force you to do it.","example":"Employees are compelled to work with integrity, even though many of the big-wigs don't have a moral bone in their body.\nFinancial pressure from competitors compelled the company to reduce costs, at all costs.\nCyclists are compelled by law to have insurance.\nDan's blatant disregard for the rules compels us to expel him from the group."},{"word":"draw on","type":"phrasal\nverb","meaning":"- To use something (experience, knowledge, skills, resources) to help you do something effectively or better.","example":"Drawing on his own personal experience he had to handle his boss with kid gloves.\nThe team is drawing on data from last year to make this year’s plan.\nLeah had to draw on every ounce of patience she had to get through the long line.\nThe team draw on multiple data sources to create precise reports swiftly, to accomodate their clients requests."},{"word":"regulatory","type":"adj","meaning":"Related to rules, laws, or controls created by an authority (such as a government or official agency).","example":"The company must follow all regulatory requirements.\nBanks are under strict regulatory supervision."},{"word":"cyberbulling","type":"n","meaning":"- Bullying someone through digital devices or on online platforms; a form of online harassment.\n- The repeated use of threats or violence in an attempt to harm or intimidate someone.","example":"Cyberbullying can hurt people just as much as face‑to‑face bullying.\nThe company has strict policies to protect employees from cyberbullying yet that isn't always enough to prevent people from doing so.\nThe new training sessions now include a section for recognising and responding to cyberbullying.\nThe school launched a strict campaign to address cyberbullying among students by denying access to their mobile phones during school hours."},{"word":"intensify","type":"v","meaning":"Intensify means to become stronger or to make something stronger, more extreme, or more serious. It describes an increase in strength, effort, feeling, or activity.","example":"Competition in the market has intensified due to the war.\nPublic pressure intensified, forcing the government to respond immediately with the approrpriate financial measures."},{"word":"formative","type":"adj","meaning":"A formative period of time or experience is one that has an important and lasting influence on a person's character and attitudes.","example":"Childhood is a formative stage in a person’s life, they should not be pressured into growing up too fast.\nMy early years in the company were highly formative."},{"word":"shield","type":"n/v","meaning":"A shield is something that protects you from danger, harm, or damage.\nTo shield means to protect someone or something from harm, danger, or negative effects.","example":"His calm attitude became a shield against stress.\nHe tried to shield his child from all the bad news, however it became near impossibe day-after-day."},{"word":"unavoidable","type":"adj","meaning":"Unavoidable means something cannot be prevented or cannot be avoided.\nIt is certain to happen, no matter what you do.","example":"Mistakes are sometimes unavoidable and are always great opportunities for learning and improving.\nConflict is often unavoidable when extreme opinions differ."},{"word":"vulnerable","type":"adj","meaning":"Vulnerable means: easily hurt, harmed, or attacked　in a weak or unprotected state。","example":"The system is vulnerable to cyberattacks, as the company won't pay for the security.\nSometimes, older buildings are more vulnerable during earthquakes, if they were made cheaply."},{"word":"enforcement","type":"n","meaning":"- The act of making sure that laws, rules, or regulations are followed.\n s, an older sister and a younger brother.\nThe sibling relationships among YAKUZA are stronger then those between real brothers.\nThis project's strategy is like the forgotten middle sibling - important, yet no one really remembers their birthday and what they're good at ...\nInnovation and confusion are siblings in our team, and they seem to show up to every meeting we have."},{"word":"lackluster","type":"adj","meaning":"- something that is not interesting, not impressive, nor energetic; it's dull or uninspiring","example":"The movie received lackluster reviews, so the so-called crowds weren't actually flocking to see the First Lady's ad-hoc flick.\nEven though the young man had ample time to prepare, his presentation was lackluster and failed to impress the audience."},{"word":"wearisome","type":"adj","meaning":"- to make someone feel very tired, bored, or annoyed, especially because it lasts too long or is boringly repetitive","example":"The long, drawn-out meeting was so wearisome, people felt doom-scrolling was even better.\nRepeating the same routine every day is wearisome, yet many people still do it, year-after-year.\nThere is nothing more wearisome than getting stuck in a traffic jam caused by imbeciles who don't know how to drive properly."},{"word":"enlighten","type":"v","meaning":"- to provide someone with information or insight that improves their understanding of something","example":"Could someone please enlighten me on why this MTG neede to be an hour?\nThe teacher tried to enlighten the students about history however, no one was interested in dredging up the past, at all.\nOur Con-Con sessions enlighten us and change the way we think in English.\nThe silence that persisted after his presentation enlightened me more than the entire presentation ever could."},{"word":"CLiCHÉ","type":"n","meaning":"- an expression or idea that is no longer effective or interesting because it has been overused","example":"The lackluster movie is full of predictable clichés, so it's obviously rather wearisome to watch.\nHe tried to avoid using clichés in his writing, as he wanted so much to enlighten everyone with his profound wisdom.\nIt's a cliché to say \"let's think outside the box,\" especially when we're clearly stuck in the box, always!\nThe team fell into the cliché of continually saying \"nice idea\" when none of us actually understood the idea."},{"word":"rampant","type":"adj","meaning":"- something that is growing, spreading, or happening very fast, especially in a way that is difficult to control","example":"Speak-up reports are rampant in my company these days.\nThe spreading of misinformation is rampant on social media, so it's becoming increasingly hard to decide what is really fake and what is not.\nInstead of using words, emojis have become rampant, especially the one that looks like it's silently screaming!\nThe Q2 report shows rampant enthusiasm for new ideas that we have absolutely no resources to execute."},{"word":"clamp down on","type":"phrasal\nverb","meaning":"- to act forcefully to prevent or restrict an activity, behaviour, or problem","example":"The government plans to clamp down on illegal gambling, but, that usually doesn't mean much, actually.\nPEOs excel at clamping down on illegal parking.\nI truly hope the police will clamp down on ALL cyclists who have earbuds in or are looking at their phones while riding."},{"word":"vein","type":"n","meaning":"- tubes that transport blood from different parts of the body back to the heart. \n- a distinct layer or line of material within something else, such as rock or marble.","example":"Veins carry blood back to the heart, so you don't want them to get blocked by eating overly-processed food, too much.\nThe rock contains veins of gold ... now, I just need to find a few more!?\nData-driven decision-making is in our veins - even when the data is mildly corrupt.\nDread shot through my veins like a high-speed rumour, when we were told we all have to sing an anime song!"},{"word":"dough","type":"n","meaning":"- usually  a thick mixture of flour, water (or other liquid), and sometimes yeast, used to make bread or other baked food\n- as slang dough refers to mMoney, especially cash","example":"This pizza dough is made with the freshest ingredients and a splash of olive oil.\nI'm miffed, because I don’t have enough dough to buy a new phone - they literally cost an arm and a leg, nowadays!\nAfter seeing the snack prices being charged at the concert, I realised I should've brought more dough with me.\nYou could feel everyone soften, like dough in the morning sunlight, when the boss said, \"Let's keep this short!\""},{"word":"construe","type":"v","meaning":"to understand the meaning, especially of other people's actions and statements, \nin a particular way:","example":"Please don't construe my silence as being an agreement, as it's actually confusion wearing a polite mask.\nOur manager construed our proposal as \"uniquely interesting\", which is usually peril in disguise.\nIt was very optimistic of him to construe my \"maybe\" as a yes.\nMost foreign people construe a Japanese nod to mean yes, which they eventually find out inevitably means no."},{"word":"mind-numbing","type":"adj","meaning":"extremely boring","example":"The MTG reached mind-numbing levels of minute details that no human should ever have to endure such torture.\nThe mind-numbing silence after Jeff's joke was the real performance review.\nOur manager's mind-numbing pep talks inevitably ends up with us having to do more wearisome work.\nThe audience felt a mind-numbing fog roll in as the slide deck hit page 108. Was there an end in sight?"},{"word":"obliged to do","type":"adj","meaning":"to be forced to do something or feel that you must do something","example":"I only felt obliged to attend the MTG, mainly because my boss didn't stop staring at me. I had to \"read the air\"!\nWe were obliged to improvise when the projector died dramatically halfway thru the presentation.\nI usually feel obliged to bring a GR8 drop of \"sake\" to every party.\nThe manager was obliged to speak, even though her courage wasn't really up to ad-libbing it."},{"word":"liven up","type":"v","meaning":"to become more interesting and exciting,","example":"We attempted to liven up Wednesday by pretending it was Friday.\nThe trendy ladies suggested innovative ways to decorate the grey room to liven it up!\nTalking about his sweet daughters always livens him up!\nThe audience felt obliged to clap after the presentation to try and liven up the atmosphere."},{"word":"cordial","type":"adj","meaning":"friendly, but formal and polite","example":"Most people will greet you cordially and then persist in interrogating you with a thousand trivial questions.\nCon-Con members are like siblings, always chatty and cordial, especially over a few too many drinks.\nThe email was cordial, however the attachment was torture.\nThe newcomer's cordial smile hid the fact that she had no idea what was really happening."},{"word":"mushy","type":"adj","meaning":"- when you describe someone as being \"mushy\" it means they're a real romantic; or get very sentimental about things\n- something very soft","example":"Don't go getting all mushy and sentimental on me! Toughen up!!\nCute, little, fluffy puppies can easily bring out the mushy side in all of us!\nHe said one kind thing and my whole feeble heart instantly turned to mush!\nI can't fathom why such people get so mushy and devote their entire time and money to such idols."}],"OUR THiRD PLACE":[{"word":"Kooky","type":"adj","meaning":"Someone who is kooky is slightly strange or eccentric, but often in a way which makes you like them.","example":""},{"word":"Brawl","type":"v","meaning":"If someone brawls, they fight in a very rough or violent way.","example":""},{"word":"Skirmish","type":"n","meaning":"A skirmish is a minor battle.","example":""}]};

// State
let deck = '';
let queue = [];       // current play queue (indices into DATA[deck])
let againQueue = [];  // words to repeat
let wi = 0;           // current index in queue
let phase = 0;        // 0=word(front), 1=meaning(back), 2=example(back)
let isFlipped = false;
let busy = false;
let savedSet = new Set(JSON.parse(localStorage.getItem('vocab_saved') || '[]'));
let isReviewMode = false;

function saveToStorage() {
  localStorage.setItem('vocab_saved', JSON.stringify([...savedSet]));
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}

/* ---------- Deck / init ---------- */
function initDeck(name) {
  deck = name;
  isReviewMode = false;
  queue = DATA[name].map((_,i) => i);
  againQueue = [];
  wi = 0; phase = 0; isFlipped = false;
  renderTabs();
  renderAll(false);
}

function startReview() {
  const words = DATA[deck];
  const reviewIndices = words.reduce((acc,w,i) => {
    const key = deck + ':' + i;
    if (savedSet.has(key)) acc.push(i);
    return acc;
  }, []);
  if (reviewIndices.length === 0) return;
  isReviewMode = true;
  queue = reviewIndices;
  againQueue = [];
  wi = 0; phase = 0; isFlipped = false;
  document.getElementById('btnReview').classList.add('review-active');
  renderAll(false);
}

function resetDeck() {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('cardScene').style.display = '';
  initDeck(deck);
}

/* ---------- Render ---------- */
function renderTabs() {
  const el = document.getElementById('deckTabs');
  el.innerHTML = '';
  Object.keys(DATA).forEach(n => {
    const b = document.createElement('button');
    b.className = 'deck-tab' + (n === deck ? ' active' : '');
    b.textContent = n + ' (' + DATA[n].length + ')';
    b.onclick = () => initDeck(n);
    el.appendChild(b);
  });
}

function renderAll(slideDir) {
  if (wi >= queue.length && againQueue.length === 0) {
    showEmpty(); return;
  }
  // Merge again queue when exhausted
  if (wi >= queue.length && againQueue.length > 0) {
    queue = [...againQueue];
    againQueue = [];
    wi = 0;
  }

  const wordIdx = queue[wi];
  const w = DATA[deck][wordIdx];
  const key = deck + ':' + wordIdx;
  const isSaved = savedSet.has(key);

  // Saved count
  const savedCountEl = document.getElementById('savedCount');
  savedCountEl.textContent = savedSet.size > 0 ? '(' + savedSet.size + ')' : '';

  // Progress
  const total = queue.length + againQueue.length;
  const done = wi;
  document.getElementById('wordCounter').textContent = (wi+1) + ' / ' + (total);
  document.getElementById('progressFill').style.width = (done/total*100) + '%';

  // Phase label
  const phaseNames = ['WORD','MEANING','EXAMPLE'];
  document.getElementById('phaseLabel').textContent = phaseNames[phase];

  // Dots
  const dotCls = ['d-word','d-meaning','d-example'];
  [0,1,2].forEach(i => {
    document.getElementById('dot'+i).className = 'dot' + (i <= phase ? ' '+dotCls[i] : '');
  });

  // Card content
  function setFront() {
    const el = document.getElementById('cardFront');
    el.className = 'card-face card-word-theme';
    let h = '<div class="card-label">WORD</div>';
    if (w.type) h += '<div class="type-badge">'+esc(w.type)+'</div>';
    h += '<div class="card-word-text">'+esc(w.word)+'</div>';
    el.innerHTML = h;
  }
  function setBack() {
    const el = document.getElementById('cardBack');
    if (phase === 1) {
      el.className = 'card-face card-back card-meaning-theme';
      let h = '<div class="card-label">MEANING</div>';
      h += '<div class="card-body">'+esc(w.meaning||'—')+'</div>';
      el.innerHTML = h;
    } else {
      el.className = 'card-face card-back card-example-theme';
      let h = '<div class="card-label">EXAMPLE SENTENCE</div>';
      h += '<div class="card-body italic">'+esc(w.example||'—')+'</div>';
      el.innerHTML = h;
    }
  }

  // Save button state
  const btnSave = document.getElementById('btnSave');
  btnSave.className = 'btn-action btn-save' + (isSaved ? ' saved' : '');
  btnSave.innerHTML = (isSaved ? '★ Saved' : '★ Save') + '<small>保存</small>';

  // Action buttons
  const actionRow = document.getElementById('actionRow');
  if (phase === 2) {
    actionRow.classList.add('visible');
  } else {
    actionRow.classList.remove('visible');
  }

  // Tap hint
  const hint = document.getElementById('tapHint');
  if (phase === 0) hint.textContent = 'Tap card to reveal meaning';
  else if (phase === 1) hint.textContent = 'Tap card to reveal example';
  else hint.textContent = '';

  // Flipper state
  const flipper = document.getElementById('cardFlipper');

  function applyContent() {
    setFront();
    setBack();
    flipper.style.transition = 'none';
    flipper.classList.toggle('is-flipped', isFlipped);
    requestAnimationFrame(() => {
      flipper.style.transition = '';
    });
  }

  if (!slideDir) {
    applyContent();
    return;
  }

  // Slide animation
  busy = true;
  const sw = document.getElementById('slideWrapper');
  const outCls = slideDir === 'next' ? 'slide-out-left' : 'slide-out-right';
  const inCls  = slideDir === 'next' ? 'slide-in-right' : 'slide-in-left';
  sw.classList.add(outCls);
  setTimeout(() => {
    applyContent();
    sw.className = 'slide-wrapper ' + inCls;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      sw.className = 'slide-wrapper';
      setTimeout(() => { busy = false; }, 380);
    }));
  }, 220);
}

/* ---------- Flip card ---------- */
function flipCard() {
  if (busy) return;
  const flipper = document.getElementById('cardFlipper');

  if (phase === 0) {
    // Flip to meaning
    phase = 1;
    isFlipped = true;
    const w = DATA[deck][queue[wi]];
    const el = document.getElementById('cardBack');
    el.className = 'card-face card-back card-meaning-theme';
    let h = '<div class="card-label">MEANING</div>';
    h += '<div class="card-body">'+esc(w.meaning||'—')+'</div>';
    el.innerHTML = h;
    flipper.classList.add('is-flipped');
    updateMeta();
  } else if (phase === 1) {
    // Flip "forward" to example — flip back to front, swap front content to example
    phase = 2;
    isFlipped = false;
    const w = DATA[deck][queue[wi]];
    // Temporarily put example on front
    const front = document.getElementById('cardFront');
    // animate: flip to back first (already showing meaning on back)
    // actually: we flip BACK to front, but front will now show example
    front.className = 'card-face card-example-theme';
    let h = '<div class="card-label">EXAMPLE SENTENCE</div>';
    h += '<div class="card-body italic">'+esc(w.example||'—')+'</div>';
    front.innerHTML = h;
    flipper.classList.remove('is-flipped');
    updateMeta();
  }
}

function updateMeta() {
  const phaseNames = ['WORD','MEANING','EXAMPLE'];
  document.getElementById('phaseLabel').textContent = phaseNames[phase];
  const dotCls = ['d-word','d-meaning','d-example'];
  [0,1,2].forEach(i => {
    document.getElementById('dot'+i).className = 'dot' + (i <= phase ? ' '+dotCls[i] : '');
  });
  const hint = document.getElementById('tapHint');
  if (phase === 0) hint.textContent = 'Tap card to reveal meaning';
  else if (phase === 1) hint.textContent = 'Tap card to reveal example';
  else hint.textContent = '';
  // Show action buttons
  const actionRow = document.getElementById('actionRow');
  if (phase === 2) actionRow.classList.add('visible');
  else actionRow.classList.remove('visible');
  // Save button
  const wordIdx = queue[wi];
  const key = deck + ':' + wordIdx;
  const isSaved = savedSet.has(key);
  const btnSave = document.getElementById('btnSave');
  btnSave.className = 'btn-action btn-save' + (isSaved ? ' saved' : '');
  btnSave.innerHTML = (isSaved ? '★ Saved' : '★ Save') + '<small>保存</small>';
}

/* ---------- Actions ---------- */
function doNext() {
  if (busy) return;
  wi++;
  phase = 0; isFlipped = false;
  renderAll('next');
}

function doAgain() {
  if (busy) return;
  againQueue.push(queue[wi]);
  wi++;
  phase = 0; isFlipped = false;
  renderAll('next');
}

function doSave() {
  const wordIdx = queue[wi];
  const key = deck + ':' + wordIdx;
  if (savedSet.has(key)) {
    savedSet.delete(key);
  } else {
    savedSet.add(key);
  }
  saveToStorage();
  updateMeta();
  const sc = document.getElementById('savedCount');
  sc.textContent = savedSet.size > 0 ? '('+savedSet.size+')' : '';
}

function showEmpty() {
  document.getElementById('cardScene').style.display = 'none';
  document.getElementById('actionRow').classList.remove('visible');
  document.getElementById('tapHint').textContent = '';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('progressFill').style.width = '100%';
  if (isReviewMode) document.getElementById('btnReview').classList.remove('review-active');
}

/* ---------- Events ---------- */
document.getElementById('cardScene').addEventListener('click', flipCard);

// Touch swipe (horizontal = next/prev, short tap = flip)
(function(){
  const scene = document.getElementById('cardScene');
  let tx=0, ty=0, moved=false;
  scene.addEventListener('touchstart', e=>{
    tx = e.touches[0].clientX; ty = e.touches[0].clientY; moved = false;
  }, {passive:true});
  scene.addEventListener('touchmove', e=>{
    const dx = Math.abs(e.touches[0].clientX - tx);
    const dy = Math.abs(e.touches[0].clientY - ty);
    if (dx > dy && dx > 8) { moved = true; e.preventDefault(); }
  }, {passive:false});
  scene.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - tx;
    if (moved && Math.abs(dx) > 50) {
      if (dx < 0 && phase === 2) doNext();
      else if (dx > 0 && phase === 2) doAgain();
    } else if (!moved) {
      flipCard();
    }
  });
})();

document.getElementById('btnAgain').addEventListener('click', doAgain);
document.getElementById('btnSave').addEventListener('click', doSave);
document.getElementById('btnNext').addEventListener('click', doNext);
document.getElementById('btnShuffle').addEventListener('click', ()=>{
  queue = shuffle(queue.slice(wi)).concat(queue.slice(0, wi));
  wi = 0; phase = 0; isFlipped = false;
  renderAll('next');
});
document.getElementById('btnReset').addEventListener('click', resetDeck);
document.getElementById('btnReview').addEventListener('click', ()=>{
  if (isReviewMode) { isReviewMode=false; document.getElementById('btnReview').classList.remove('review-active'); initDeck(deck); return; }
  startReview();
});

document.addEventListener('keydown', e=>{
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); phase===2 ? doNext() : flipCard(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); phase===2 ? doAgain() : null; }
  if (e.key === 's' || e.key === 'S') doSave();
});

initDeck(Object.keys(DATA)[0]);
</script>
