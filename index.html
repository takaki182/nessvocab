<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Flashcards</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
}

/* Header */
h1 {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #94a3b8;
  margin-bottom: 18px;
}

/* Deck tabs */
.deck-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  background: #1e293b;
  padding: 4px;
  border-radius: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.deck-tab {
  padding: 7px 14px;
  border: none;
  background: transparent;
  color: #64748b;
  font-size: 0.78rem;
  font-weight: 600;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.2s;
}
.deck-tab.active { background: #3b82f6; color: white; }

/* Top controls */
.top-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}
.btn-sm {
  padding: 6px 14px;
  border: 1px solid #334155;
  background: #1e293b;
  color: #94a3b8;
  border-radius: 8px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
}
.btn-sm:hover { background: #334155; color: #e2e8f0; }
.btn-sm.review-active { background: #7c3aed; border-color: #7c3aed; color: white; }
.saved-count {
  font-size: 0.78rem;
  color: #64748b;
}

/* Progress */
.progress-row {
  width: min(500px, 100%);
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  font-size: 0.78rem;
  color: #64748b;
}
.progress-bar {
  width: min(500px, 100%);
  height: 3px;
  background: #1e293b;
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 18px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #3b82f6, #7c3aed);
  border-radius: 2px;
  transition: width 0.35s;
}

/* Card scene */
.card-scene {
  width: min(500px, 100%);
  height: 310px;
  perspective: 1000px;
  margin-bottom: 20px;
  cursor: pointer;
  user-select: none;
  position: relative;
  overflow: visible;
}

/* Slide wrapper (for next/prev transitions) */
.slide-wrapper {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s;
}
.slide-wrapper.slide-out-left  { transform: translateX(-115%); opacity: 0; }
.slide-wrapper.slide-out-right { transform: translateX(115%);  opacity: 0; }
.slide-wrapper.slide-in-right  { transform: translateX(115%);  opacity: 0; transition: none; }
.slide-wrapper.slide-in-left   { transform: translateX(-115%); opacity: 0; transition: none; }

/* Card flip */
.card-flipper {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.48s cubic-bezier(0.4,0,0.2,1);
}
.card-flipper.is-flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 36px;
  text-align: center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}
.card-back {
  transform: rotateY(180deg);
}

/* Card themes */
.card-word-theme   { background: linear-gradient(140deg,#1d4ed8,#6d28d9); box-shadow: 0 20px 50px rgba(59,130,246,0.3); }
.card-meaning-theme{ background: linear-gradient(140deg,#064e3b,#0f766e); box-shadow: 0 20px 50px rgba(16,185,129,0.25); }
.card-example-theme{ background: linear-gradient(140deg,#78350f,#b45309); box-shadow: 0 20px 50px rgba(245,158,11,0.25); }

.card-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 14px;
}
.type-badge {
  display: inline-block;
  padding: 2px 10px;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  font-size: 0.72rem;
  margin-bottom: 10px;
}
.card-word-text {
  font-size: 2.2rem;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.02em;
}
.card-body {
  font-size: 0.95rem;
  line-height: 1.7;
  opacity: 0.93;
  white-space: pre-line;
  overflow-y: auto;
  max-height: 210px;
  width: 100%;
  scrollbar-width: thin;
}
.card-body.italic { font-style: italic; text-align: left; }

/* Tap hint */
.tap-hint {
  font-size: 0.72rem;
  color: #3b4a63;
  margin-bottom: 14px;
  height: 16px;
  transition: opacity 0.3s;
}

/* Dots */
.dots {
  display: flex;
  gap: 9px;
  margin-bottom: 20px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #1e293b;
  border: 1.5px solid #334155;
  transition: all 0.3s;
}
.dot.d-word    { background: #3b82f6; border-color: #3b82f6; transform: scale(1.2); }
.dot.d-meaning { background: #10b981; border-color: #10b981; transform: scale(1.2); }
.dot.d-example { background: #f59e0b; border-color: #f59e0b; transform: scale(1.2); }

/* Action buttons */
.action-row {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  transform: translateY(8px);
}
.action-row.visible {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}
.btn-action {
  flex: 1;
  max-width: 140px;
  padding: 12px 10px;
  border-radius: 14px;
  border: 2px solid transparent;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.btn-action small {
  font-size: 0.65rem;
  font-weight: 400;
  opacity: 0.7;
}
.btn-again {
  background: #1e293b;
  border-color: #ef4444;
  color: #ef4444;
}
.btn-again:hover { background: #ef4444; color: white; }
.btn-save {
  background: #1e293b;
  border-color: #f59e0b;
  color: #f59e0b;
}
.btn-save:hover { background: #f59e0b; color: white; }
.btn-save.saved { background: #f59e0b; color: white; }
.btn-next {
  background: #1e293b;
  border-color: #10b981;
  color: #10b981;
}
.btn-next:hover { background: #10b981; color: white; }

/* Empty state */
.empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 40px;
  color: #64748b;
  text-align: center;
}
.empty-state .emoji { font-size: 3rem; }
.empty-state h2 { font-size: 1.1rem; color: #94a3b8; }
</style>
</head>
<body>

<img src="top_ness.png" alt="Vocabulary" style="width: min(300px, 75%); margin-bottom: 16px; display: block;">

<div class="deck-tabs" id="deckTabs"></div>

<div class="top-controls">
  <button class="btn-sm" id="btnShuffle">🔀 Shuffle</button>
  <button class="btn-sm" id="btnReview">★ Review <span id="savedCount" class="saved-count"></span></button>
  <button class="btn-sm" id="btnReset">↩ Reset</button>
</div>

<div class="progress-row">
  <span id="wordCounter"></span>
  <span id="phaseLabel" style="color:#475569;font-size:0.75rem;letter-spacing:0.05em;"></span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- Card -->
<div class="card-scene" id="cardScene">
  <div class="slide-wrapper" id="slideWrapper">
    <div class="card-flipper" id="cardFlipper">
      <div class="card-face" id="cardFront"></div>
      <div class="card-face card-back" id="cardBack"></div>
    </div>
  </div>
</div>

<p class="tap-hint" id="tapHint">Tap card to reveal meaning</p>

<div class="dots">
  <div class="dot" id="dot0"></div>
  <div class="dot" id="dot1"></div>
  <div class="dot" id="dot2"></div>
</div>

<div class="action-row" id="actionRow">
  <button class="btn-action btn-again" id="btnAgain">
    Again
    <small>もう一度</small>
  </button>
  <button class="btn-action btn-save" id="btnSave">
    ★ Save
    <small>保存</small>
  </button>
  <button class="btn-action btn-next" id="btnNext">
    Next →
    <small>次へ</small>
  </button>
</div>

<div class="empty-state" id="emptyState">
  <div class="emoji">🎉</div>
  <h2>All done!</h2>
  <p>全てのカードを完了しました</p>
  <button class="btn-sm" onclick="resetDeck()" style="margin-top:8px;">↩ もう一度</button>
</div>

<script>
const DATA = {"CON&CON":[{"word":"emulsifier","type":"n","meaning":"- A food additive to make the food or drink smooth.","example":"Egg yolk acts as a natural emulsifier in homemade mayonnaise. It helps the oil and vinegar blend smoothly.\nWithout an appropriate emulsifier, the sauce will just keep breaking apart.\nDid you know that Lecithin is a common emulsifier used in both cosmetics and cooking?"},{"word":"recurrently","type":"adv","meaning":"- an event or a feeling that is experienced (or happens) more than once \n- it's repeated regularly, frequently \n- it happens over and over; again and again","example":"If someone has recurrent headaches, it means they get them again and again, so they should go and consult a doctor.\nHe recurrently forgets to turn off the lights after leaving the room.\nThe young couple recurrently visit her parents on weekends."},{"word":"doctorate","type":"n","meaning":"- The highest degree awarded by a university faculty.","example":"After completing her doctorate in engineering, she began teaching at a top institution.\nTheir professor holds a doctorate in Japanese literature."},{"word":"bleak","type":"adj","meaning":"- A bad or terrible situation that seems unlikely to improve.\n- It means something that's cold; empty; sad; or without hope.","example":"Japan's future continues to look bleak for families, as many young people don't have any desire to get married!\nThe weather was bleak, with heavy dark clouds and a biting wind that made me want to stay at home snug and cosy.\nDespite the bleak circumstances, he found a way to stay optimistic and pushed onwards!\nThe situation may seem bleak, however clear communication can bolster trust within the team and get them working efficiently together."},{"word":"worrisome","type":"adj","meaning":"- something or someone that causes people to worry\n- it might be troubling; dangerous even unpredictable","example":"There is worrisome data for Japanese companies, finding talented people is becoming intense.\nThe sudden drop in sales figures was worrisome for the team.\nThe doctor assured him that the symptoms were unusual but not worrisome.\nIt's worrisome how quickly misinformation spreads online."},{"word":"tenfold","type":"adv","meaning":"- multiple it by ten ... ten times a much ... increases by ten times ... ten times bigger\n- increasing (verb) revenue (noun) + tenfold  /quickly / successfully (adverbs) ...","example":"Kameda’s expansion mirrored Japan’s postwar boom, increasing revenues tenfold between 1965 and 1974 and then dropped.\nIf someone's confidence boosts tenfold, it means they feel ten times more confident."},{"word":"dough","type":"n","meaning":"- A fairly firm mixture of flour, water and sugar to make bread, biscuits, pizza, pastries etc.\n- Dough is also slang for money ... $$$","example":"I kneaded the dough to make fresh bread.\n(money slang) = I don't have much dough on me! Can you lend me 10,000 yen?\nI wish I made a lot of dough coaching English ...\nDough in the story refers to the ingredients for making new products in Kameda."},{"word":"efficaciously\nefficacious","type":"adv\nadj","meaning":"- Something that is efficacious is producing the result that you wanted. \n- It's focusing on effective results.","example":"In a test, if you get the result you wanted, for example, medicine development clinical test, the medicine is efficacious.\nThe new hayfever medicine is proving to be highly efficacious and is selling out fast.\nShadow Talking daily has been more efficacious than anything else I've tried.\nTaking the time to reflect on what happened is sometimes an efficacious way to improve and grow, personally."},{"word":"envious\nenvy","type":"adj\nn","meaning":"- When you are envious of someone, you want something that they have.\n- When you are green with envy you really, really want what they have; you're longing for it so bad.\n- When you strongly wish that you had the same qualities or things that they have.","example":"The tourists gazed at the luxurious yachts with envious admiration.\nI couldn't help but feel envious of his ability to learn new skills so quickly.\nThey watched enviously as the winning team celebrated their victory with a dance.\nWhen he saw his ex- with another man, he was overcome by a sudden surge of jealousy and envy."},{"word":"conventional","type":"adj","meaning":"- Someone who is conventional has behaviour or opinions that are ordinary and normal.\n- A conventional method or product is one that is usually used or that has been in use for a long time.","example":"Instead of a conventional career path, she chose to start her own business and pursue her pasion.\nDespite Trent's overnight success, Hilary remained grounded in her conventional values of hard work and honesty.\nWe must reduce the danger of war by controlling nuclear, chemical and conventional arms.\nAt first sight, the design may look too simple and conventional, however it's surprisngly effective and it will undoubtedly become a crowd-pleaser."},{"word":"rational\nrationale","type":"adj\nn","meaning":"- rational decisions and thoughts are based on reason rather than on emotion","example":"Before making any major decisions, it's important to have a clear rationale backed by solid reasoning.\nIt's important to stay rational during stressful situations.\nHer argument was rational and well-supported by data and statistics."},{"word":"feebly\nfeeble","type":"adv\nadj","meaning":"- to be in a weak way, without any energy, strength, nor power\n- to describe someone as being feeble shows you are criticising them, \n     because they are afraid of taking strong action or they are not making any effort","example":"She made a feeble attempt to argue her point, but her lack of confidence and rationale weakened her case.\nHis feeble excuses did little to convince anyone that he was telling the truth.\nThe old bridge looked feeble, its wooden planks creaking under the weight of passing cars."},{"word":"surge for","type":"pv","meaning":"- to suddenly move very quickly in a particular direction\n- to increase suddenly and greatly, after being steady or developing only slow\n- surge forward is to suddenly move forward together","example":"Investors are surging for opportunities in the rapidly growing tech sector.\nConsumers are surging for the latest smartphone model, causing stores to sell out within hours.\nI felt the blood surging thru my veins making me feel invincible!\nThe paparazi and onlookers surged forward as Tom made his appearance outside the film festival."},{"word":"without much ado\nwithout further ado","type":"phrase","meaning":"- without a lot of commotion, excitement, or ceremony\n- to do something straight away, without discussing it; there's no delay, you just do it","example":"She accepted the award without much ado, offering a brief thank-yo speech.\nThe company implemented the new policy without much ado, ensuring a smooth transition.\nAnd now, without further ado, allow me to introduce you to the star of the show, Jeff!"},{"word":"partake","type":"v","meaning":"- if you partake of food or drink, you eat or drink some of it\n- if you partake in an activity, you take part in it; you participate or join in","example":"She refused to partake in the heated debate, preferring to stay neutral.\nThe foreign guests were invited to partake in the celebrations."},{"word":"fraudulent","type":"adj","meaning":"- a fraudulent activity is deliberately deceitful; dishonest; or untrue\n- it is being false; crooked; untrue; crafty; deceptive;phony","example":"She unknowingly bought a fraudulent painting, believing it to be an original.\nThe company was sued for engaging in fraudulent business practices."},{"word":"extort\nextortion","type":"v\nn","meaning":"- When someone extorts money from you, they get it from you using force, threats, or other unfair or illegal means.\n- Extortion is the crime of obtaining something from someone using force or threats.","example":"Criminals attempted to extort money from the wealthy businessmen.\nAuthorities uncovered a scheme to extort funds from unsuspecting victims online.\nD.T. has been charged with extortion and abusing his powers for personal gain.\nThe scammer hoped to extort a quick payment before anyone noticed what was going down."},{"word":"nail","type":"v","meaning":"- if you nail something somewhere, you fix it there using one or more nails\n- if you nail something, then you do it extremely well or successfully","example":"Why didn't he nail the banana to the wall? I still ponder why did he choose duct tape instead?\nAfter weeks of practice, she finally nailed the perfect free throw.\nYou nailed that dance routine - it was flawless!\nShe nailed the presentation, impressing everyone with her confidence, clarity and conciseness."},{"word":"work the grind","type":"phrase","meaning":"- to persistently work very hard and consistently\n- to put in the effort needed to achieve a goal or overcome a challenge","example":"Despite nearly being exhausted, too many people continue to work the grind to try and get ahead financially in life.\nWhy do so many people prefer to constantly work the grind and never take a moment to really enjoy life?"},{"word":"cheekily\ncheeky","type":"adv\nadj","meaning":"- In a manner that seems disrespectful in speech or behaviour; impudently; \n    but also in a fun way; usually for kids.\n- To think that a person is slightly rude or disrespectful, but in a charming or amusing way.","example":"She cheekily poked her tongue out at her friend before bursting into laughter.\nThe boys cheekily winked at each other after pulling off a clever prank.\nNess gave me a cheeky wink as she stealthily slipped the last juicy Hida steak onto her plate!\nRaylee couldn't resist (making) a cheeky dig about Winston's cooking skills, which was cheeky coming from someone who can't even boil water."},{"word":"throw sb aback","type":"v","meaning":"- to surprise or shock someone so much that they do not know how to behave for a short time","example":"His unexpected kindness threw me aback, leaving me momentarily speechless. I didn't know he had it in him.\nThe sudden thunderclap took us aback, making us all fall off our seats.\nHer beautiful voice took me aback - I never knew she could sing so beautifully!"},{"word":"mustered up","type":"pv","meaning":"- if you muster up a feeling of courage or energy, you try hard to find that quality in yourself\n      because you need it in order to do something","example":"The newcomer had to muster up all of her courage before standing in front of all the CEO's to give her prez.\nThe cheeky boy mustered up his courage to ask his teacher if he could eat his breakfast in class.\nWhen you go shopping in a crowded shop you have to muster up all of your patience, as people can get pretty rude and aggressive, when it comes to bargain hunting."},{"word":"muster","type":"v","meaning":"- if you muster something such as support, strength, or energy, you gather as much of it as you can in order to do something\n- when soldiers muster or are mustered, they gather together in one place in order to take part in a military action","example":"He went around all of the companies in the area to muster support for his new project. \nMustering all of his strength, Jeff lifted the heavy box into the trunk.\nThe General had mustered his troops to the northern side of the mountain range."},{"word":"own up to","type":"phrase","meaning":"- to admit that you have done something wrong, especially something that is not so serious\n- to confess to (doing) something bad or naughty","example":"The kids finally owned up to breaking the window, as they wanted their soccer ball back.\nNo one was willing to own up to the broken vase.\nHe had to own up to his mistake and apologise to his team."},{"word":"fateful","type":"adj","meaning":"- to have an important, and often very bad, effect on future events\n- an action or time when something crucial or disastrous happens","example":"Some people often think back on that fateful decision that had made in haste ... and wonder how could they have changed their life for the better. \nHe refused to own up to his fateful actions, even when confronted with real evidence from eyewitnesses."},{"word":"barracks","type":"n","meaning":"- A building or group of buildings in which soldiers live.","example":"The POW soldiers weren't allowed outside as they were confined to their barracks as punishment."},{"word":"clutch","type":"v","meaning":"- To hold something tightly because you do not want to lose it.","example":"At the funeral, the young girl clutched her grandmother's old locket, while trying to hold back her tears. She remembered just how much she loved her and was going to miss her.\nHe clutched his backpack tightly when he boarded the local train.\nThe drunk staggered and had to clutch the bar's counter in order to remain upright."},{"word":"depict","type":"v","meaning":"- To represent; indicate or show something in a picture or story.","example":"This chart clearly depicts how sales have shifted over the past few months, due to global instability.\nWhen I look at some artist's work, I have no idea what they're trying to depict.\nThis mural vividly depicts scenes from the town's history.\nThe media often tries to depict an unclear message that can easily be misconstrued, by not revealing all of the info."},{"word":"tenement","type":"n","meaning":"- a large building divided into apartments, usually in a poor area of a city","example":"The old tenement building had narrow hallways and tiny apartments."},{"word":"Jeux interdits","type":"n","meaning":"- Forbidden Games (French: Jeux Interdits) is a 1952 French war drama film directed by René Clément and based on François Boyer's novel Les Jeux Interdits.","example":""},{"word":"figure out","type":"pv","meaning":"- to finally understand something or someone, successfully\n- to find the solution to a problem after a lot of thought\n- to work out an answer or a solution to a problem","example":"She spent hours trying to figure out a solution to the tricky problem.\nIt took them a while to figure out the best route to the Expo site."},{"word":"chastise","type":"v","meaning":"- To criticise; condemn sharply; or scold someone severely for something.\n- To say something angrily to someone; or to punish someone for what they have or have not done.","example":"The father chastised their kids for not helping their mother clean up.\nThe coach chastised the kids for messing around and not listening to his advice.\nMy boss decided to chastise me for being late in front of everyone, which was impressive, since he arrives late every other day.\nNina loves to chastise her team loudly, for not following the rules, she seems to forget daily."},{"word":"whatsoever","type":"adv","meaning":"- used after a negative phrase to add emphasis to the idea that is being expressed\n    = it's the same as: \"in any way\" or \"at all\" ...","example":"He had no interest in the conversation whatsoever and just kept glancing at his phone, so his GF chastised him.\nThere was no evidence whatsoever to support her alibi."},{"word":"addictive","type":"adj","meaning":"- If a substance, especially a drug, is addictive, your body starts to need it regularly and you are unable to stop taking it.","example":"The kid told us that the new video game was so addictive that she lost track of time playing it.\nThis new snack is so addictive ... I can't stop eating them! I'm hooked!!\nMany people try to say that marijuana is harmless and it's not addictive."},{"word":"addiction","type":"n","meaning":"- An inability to stop doing or using something, especially something harmful.","example":"His mother tried to help him fight his drug addiction.\nThe team has a healthy addiction for finding the most efficient shortcuts to improve their workflow.\nI've an addiction for puzzles. I can't put them down until I've solved them."},{"word":"affirm","type":"v","meaning":"- To certify publicly that something is true or exists.\n- To declare; state; proclaim; assert something as being true or right.","example":"The members confidently affirmed their commitment to prepare more in advance for each discussion.\nHe nodded firmly to affirm his agreement with the proposal.\n\"This place is a complete dump,\" affirmed Mr. T."},{"word":"scam","type":"n","meaning":"- a dishonest plan for making money or getting an advantage, \n      especially one that involves tricking people\n- an illegal trick","example":"She realised too late that the online giveaway was just a scam to steal her personal info.\nLuckily he did his research and didn't fall for the online scam promising to return his money tenfold."},{"word":"fictitious","type":"adj","meaning":"- not true, or not real","example":"The movie is set in a fictitious town, but it's story reflects real-life struggles."},{"word":"presume\npresuming\npresumedly","type":"v\nadj\nadv","meaning":"- to believe something to be true because it is very likely, although you are not certain","example":"I presume you've already heard the news about the upcoming event.\nI haven't received any confirmation from him yet, but I presume he'll be arriving soon. \nI would never presume to question your judgment on such matters. You're the expert!!"},{"word":"fraud","type":"adj","meaning":"- fraud is the crime of getting money by deceiving people\n- a crime for gaining financial benefits by lying or tricking people","example":"He was arrested for commiting fraud after forging documents and trying to scam money from people to pay for his drug addiction."},{"word":"hooked on","type":"pv","meaning":"- if you are hooked on a drug, you feel a strong need for it and you cannot stop taking it\n- hooked on something means you enjoy it so much it takes up a lot of your time, interest and attention","example":"After just one episode, she was completely hooked on the new TV series.\nI got hooked on drinking coffee it became an addiction of mine.\nMany of the leaders today are so hooked on power and money they believe they're invincible.\nI'm so hooked on this reality show. I just can't wait for the next episode."},{"word":"solitary","type":"adj","meaning":"- used to emphasise that there is only one of something\n- usually a person or an animal that spends a lot of time alone","example":"He enjoys his solitary walks along the quiet beach, every morning.\nI presume once his wife left him, he would spend his evenings in solitary drinking."},{"word":"swindle","type":"v/n","meaning":"- to get money dishonestly from someone by deceiving or cheating them","example":"Con artists always try to swindle tourists into visiting their bar, getting them drunk and ripping them off.\nSmooth talkers try to swindle unsuspecting women out of their savings, with the allure of marriage."},{"word":"doubts arise","type":"pv","meaning":"- To have uncertainty or skepticism when beginning to develop something.\n- When someone starts questioning the truth, reliability or feasibility of a situation.","example":"If doubts arise about the project's feasibility, we should reassess our strategy.\nDoubts arise whenever conflicting ideas emerge on how to conduct the meeting efficiently.\nWhenever unexpected challenges appear, doubts arise about his ability to lead the group.\nI wondered why doubts didn't arise sooner. He was never a capable contender for such a huge responsibility."},{"word":"uncannily\nuncanny","type":"adv\nadj","meaning":"- in a way that is uncanny = means it's strange and mysterious\n- something that is strange and difficult to explain","example":"The twins looked uncannily alike, despite having VERY different personalities.\nThe painting was uncannily lifelike; it was almost as if it was a photo.\nI had an uncanny feeling that something big was about to happen.\nHe has uncanny accuracy when it comes to totalling up the bill."},{"word":"engaging","type":"adj","meaning":"- To be pleasant and attracting your interest.\n- Something or someone that is very pleasing, interesting or entertaining.","example":"His engaging personality makes people feel comfortable around him.\nThe fictitious story of a child living on an island was so engaging that I couldn't put the book down.\nHer lessons are always so engaging that the students find the most complex topics easy to understand.\nWith such an engaging smile, my orthodontist puts everyone at ease, and dispels any doubts."},{"word":"generate","type":"v","meaning":"- to produce or cause something to exist or begin","example":"These new solar panels can generate enough electricity to power the entire house, tenfold.\nThis software can generate reports in seconds ... but has no originality nor creativity.\nTheir brainstorming session generated lots of fresh new ideas for the project."},{"word":"ample","type":"adj","meaning":"- To be or have more than enough of something (in amount).","example":"The hotel offers ample parking for guests.\nThey had ample time to prepare for the discussion.\nThe spacious kitchen provides ample storage space for all of his utensils."},{"word":"ponder","type":"v","meaning":"- to spend time thinking carefully and seriously about a problem, a difficult question, or something that has happened","example":"The kid took a moment to ponder his next move in the chess game.\nI often ponder what life would be like if I were a man.\nWhen hiking through the mountains be sure to ponder the beauty of nature."},{"word":"fruition","type":"n","meaning":"- if a plan, project etc comes to fruition, it is successfully put into action and completed, often after a long process","example":"After years and years of hard working the grind, his dream finally came to fruition.\nThe project took half a year to develop, but it has now reached fruition.\nShe was thrilled to see her vision come to fruition after years of planning."},{"word":"escalate","type":"v","meaning":"- When a bad situation escalates it becomes greater in size; seriousness or intensity.","example":"Their argument began as a minor disagreement but quickly escalated into a heated debate.\nThe company took immediate action to prevent the scandal from escalating further.\nPrices tend to escalate during peak holidays seasons, due to high demand.\nIf we don't address the situation right now, the problem will surely escalate into something we cannot control."},{"word":"swindle","type":"v","meaning":"- to get money from someone by deceiving them","example":"When they were doing business and Fong knew he was being swindled, he had nothing but bold hatred for the Ismaili.\nThe agent tried to swindle him out of his deposit and Marc's trying to sort it out."},{"word":"bureaucrats","type":"n","meaning":"- The officials who are employed rather than elected to do the work of a government, business etc.","example":"By taking power from the politicians, businessmen and bureaucrats still do nothing to make their power disappear.\nThese women work harder and with more style than any bureaucrat or professor, and they're much more interesting to converse with. They deserve more respect and praise.\nThe bureaucrats assured the public the process would be \"quick\", which is why it inevitably took 3 years to complete.\nApparently the bureaucrats are \"working on it\", which means we'll hear back from them sometime in the next century."},{"word":"grumble","type":"v","meaning":"- if someone grumbles, they complain about something in a bad-tempered way","example":"Kids should be taught respect and know that they should never grumble about their Mum.\nThe thing I love about her the most is that she never ever grumbles about anyone or anything. She takes in all in her stride. \nSo many people grumble about politicians but, they never do anything about it - they never even vote!"},{"word":"assimilate into","type":"pv","meaning":"- When people such as immigrants assimilate into a community or when that community assimilates them, they become an accepted part of it.","example":"It's not easy for most foreigners to assimilate into Japanese life, as it can be daunting to align and adjust to a totally new way of life.\nIt can take a few months to assimilate into a busy routine, after taking a long break.\nThe young couple found it hard to assimilate into the neighbourhood, because the villagers generally don't like cityfolk.\nThe intern found it easy to assimilate into the demanding workflow, because she knew how to communicate with all kinds of people."},{"word":"indulge\nindulge in","type":"v\npv","meaning":"- if you indulge yourself in something, you allow yourself to have or do something that you really wanted to enjoy","example":"I was busy for 3 months, but now I have some spare time to indulge myself in binge watching my favourite anime series."},{"word":"lowbrow\nlowbrowism","type":"adj\nn","meaning":"- lowbrow entertainment, magazines, books etc. are easy to understand and are not concerned with serious ideas about art, culture etc. (negative meaning = low end)","example":"Comic art was considered a rather lowbrow form of entertainment, but that is not the case nowadays.\nMany people considered him to be a lowbrow by the way he dressed and acted, but it was actually just a cover up."},{"word":"excessive","type":"adj","meaning":"- Something that you disapprove of, because the amount or level of something is more than necessary or reasonable.","example":"Excessive use of social media can lead to negative mental health outcomes.\nWe are all well-aware that an excessive workload will lead to burnout.\nExcessive criticism often creates serious problems or damages trust more than it ever helps.\nThe government decided the excessive heatwave deserves it's own name."},{"word":"internalise","type":"v","meaning":"- if you internalise something such as a belief or a set of values, you make it become part of your attitude or way of thinking.","example":"Employees are apt to internalize company values if they see the behaviour modeled by company leaders."},{"word":"partake","type":"v","meaning":"- if you partake in an activity, you take part in it\n- if you partake of food or drink, you eat or drink some of it\n (formal: It has a nuance of sharing something with others formally)","example":"When partaking in online games, make sure you take moderate rest."},{"word":"copious","type":"adj","meaning":"- A copious amount of something is a large amount of it.","example":"I went out for a meal with Ness the other day and we had a copious amount of sake.\nMorton always takes copious notes during the MTG, to make sure nothing was missed.\nThe garden produced copious amount of cucumbers this year, thanks to the warm weather.\nThe victim suddenly bled copious amounts having been biten by the vampire."},{"word":"frown upon","type":"pv","meaning":"- when people frown upon something or someone, they don't like it or disapprove of it \n(frown = furrow one's brows in an expression indicating disapproval)","example":"Smoking on the streets is not illegal but it is frowned upon nowadays."},{"word":"gluttony","type":"n","meaning":"- gluttony is the act or habit of eating too much and being greedy. (negative meaning)","example":"Gluttony involves excessive cravings for the pleasure that food and drinks provide to a person."},{"word":"moderation","type":"n","meaning":"- the avoidance of excess or extremes, especially in one's behaviour\n- to act in a way of being modest; reasonable and not over-doing it","example":"Social media can provide an invaluable sense of connection when it is used in moderation and with good intention."},{"word":"sorrow","type":"n","meaning":"- a feeling of great sadness because something very bad has happened","example":"It is sometimes good to watch a stand-up comedy show and just laugh. It can help take away your sorrow."},{"word":"cheesy (casual)","type":"adj","meaning":"- If you describe something as cheesy, you mean that it is cheap; unpleasant; or insincere (in a way that is usually embarassing but also amusing).","example":"When you are stressed out, a fun and cheesy 80's B-grade horror movie is a good way for you to unwind.\nI'm so addicted to reading his frivolous love letters, because they're so cheesy that even the paper cringes a little.\nIt's pitiful that some politicians persist in thinking that \"the public\" really do approve of their cheesy slogans."},{"word":"hare-brained (casual)","type":"adj","meaning":"- it is something that is totally crazy, silly and unlikely to succeed","example":"It was a hare-brained decision to invest all his money on that dubious business.\nYou may easily frown upon my choice of movie, but as far as I'm convinced this hare-brained comedy is actually a masterpiece!"},{"word":"discreet","type":"adj","meaning":"- When you are discreet about something you are doing, you tend to keep it secret and don't tell anyone about it to avoid being embarrassed.\n- You want to avoid embarrassing or offending someone by your words or actions.\n- To be polite and careful in what you say or do.","example":"He preferred to be discreet about his educational background, so nobody knew how great his academic accomplishments actually were.\nMost of the ladies working here tend to be very gossipy and not always discreet, so be careful who you confide in.\nMartin's discontent became blatantly obvious when he could no longer remain discreet and shouted out his anger.\nThe stalker always followed his target at a discreet distance."},{"word":"petty","type":"adj","meaning":"- it is something that is considered minor; small scale or not important\n- trivial; inessential things that are not usually needed","example":"We spent most of the time arguing over petty details of the issue. \nMy now-ex BF was so petty and never that discreet as he even had the gall to change the Wi-Fi password, after I ate the last slice of pizza."},{"word":"trivial","type":"adj","meaning":"- if you describe something as trivial, you think that it is unimportant and not serious","example":"Arguments between couples are often about trivial matters.\nSteve got caught up in the moment and spent over an hour stressing about a trivial decision: which socks best represented his mood, today? Were they going to be the neon pink ones or orange polka dot ones ... ???"},{"word":"addicted to","type":"pv","meaning":"- If someone is addicted to something, they like it very much and want to spend as much time doing it.","example":"57% of people admit they are addicted to their phones.\nMaria is addicted to eating ice-cream, even in the middle of winter!\nIan is addicted to checking the weather forecast every 30 minutes."},{"word":"scroll","type":"v","meaning":"- if you scroll through text on a PC screen, you move the text up or down to find the information that you need","example":"It's easy to scroll up and down on PC screen using your mouse wheel."},{"word":"unfold","type":"v","meaning":"- if a story unfolds or if someone unfolds it, it is told to someone else\n- it becomes known or understood by people\n- if the story develops it unfolds","example":"The outcome depends on conditions as well as how events unfold.\nAiden's gambling episode unfolded as the discussion got juicier and more indepth."},{"word":"inconsequential","type":"adj","meaning":"- is something that is not important; trivial or petty","example":"The mistake was deemed so inconsequential ... we had forgotten all about it.\nThe CEO's speech focused on trivial details, making the discussion feel inconsequential."},{"word":"caught up in","type":"phrasal \nverb","meaning":"- To become involved in something, especially when you do not want to be involved in it.","example":"We got caught up in his sales talk and signed the contract without checking the details.\nWe all got caught up in the delay as only the bureaucrats could delay a decision about the delay.\nAccording to the bureaucrats, the new policy is \"user-friendly\", which explains why everyone got caught up in it. No one can comprehend what that actually means."},{"word":"impulse","type":"n","meaning":"- a sudden desire to do something, without thinking about it carefully\n- to do it with any plan, or on the spur of the moment","example":"It was too hard for me to resist the impulse ... I just had to have to black edo kiriko sake cup.\nHave you ever had a sudden impulse to call an old friend you have spoken to in years?"},{"word":"splurge on","type":"v","meaning":"- to spend a lot of money, usually on things that you do not really need, but like at the time of purchase","example":"I love to splurge on anime figures and game cards in Nakano Broadway.\nOn their recent shopping spree, the influencers splurged on an ultra-dear skincare cream, only to forget to use it half the time."},{"word":"sprees","type":"n","meaning":"- if you say \"you are going on a particular kind of spree (e.g. shopping spree),\" \n     you spend a period of time doing something in an excessive way","example":"We will go on an annual shopping spree at Gotemba Premium Outlet mall this weekend."},{"word":"hoard","type":"v","meaning":"- to collect and save large amounts of food, money etc, especially when it is not necessary to do so","example":"Why do people feel the need to hoard toilet paper? Is it the most important thing we can't live without?"},{"word":"sporadic","type":"adj","meaning":"- something that is happening only occasionally or at intervals that are not regular\n- it is done intermittently; scattered; off and on but not regularly","example":"Sporadic gunfire was reported across the country's capital.\nI don't know how she makes a living as a salesperson, as her visits are always sporadic and never for very long.\nThe Wi-Fi connection was frustratingly sporadic, cutting out at the worst possible times."},{"word":"undeniable","type":"adj","meaning":"-if you say something is undeniable, you mean that it is definitely true\n- it is something that you cannot deny nor reject","example":"It is an undeniable fact that young people nowadays just don't want to study abroad. They're NOT curious anymore."},{"word":"curate\ncurated","type":"v\nadj","meaning":"- To carefully choose; arrange and present different items in order to get a particular effect.\n- (online content, merchandise, information, etc.) selected, organised, and presented using professional or expert knowledge.","example":"These special playlists are curated based on music trends and data by our editorial team.\nThe proactive team curated the festival back in 2011 to help the area recover faster from the disaster.\nEverything about the exhibition on creepy-crawlies was carefully curated to help visitors overcome their fear of such insects.\nThe training materials Jeff & Ness provide are always curated to match the members' specific skill gaps."},{"word":"frivolous","type":"adj","meaning":"- if you describe an activity as frivolous, you disapprove of it because it is not useful and wastes time or money","example":"Spending copious amounts of dough on merchandise (products) for bands and artists may seem frivolous to those who are not into them, but splurging on what you love can be a GR8 stress relief. \nShe hurkle-durkled for an extra hour, ignoring her alarm and enjoying frivolous luxury of staying in bed."},{"word":"decent\ndecently","type":"adj","meaning":"- To describe something which is considered to be of an acceptable standard or of high-quality.\n- To be morally correct, good, honest or acceptable.\n- To behave in a polite way that people approve of.","example":"The mobile coffee vendor in front of our office offers reasonable but decent coffee and snacks.\nIf you don't dress and act decently, people tend to think you're a lowbrow.\nIf my roommate was decent he wouldn't have barged into my room while I was hurkle-durkling demanding I make brekkie. \nAs Dan was incapable of giving a decent explanation, people just started to overlook him completely."},{"word":"contradiction","type":"n","meaning":"- A combination of ideas, statements or features that are oppose to one another.\n- Something that is difficult or confusing, as they seem to be crashing or opposites.","example":"I cannot trust him because there seems to be a few contradictions in his words and actions. I also feel he's trying to scam us, so we should be concerned by his fickle nature.\nResearchers highlighted the contradictive nature of the data, effectively turning the entire case into a contradiction.\nThere's a clear contradiction between what Don promised and what he actually did.\nOne of the reasons I enjoy living in Japan is that it's a land of contradictions!"},{"word":"crude\ncrudely","type":"adj\nadv","meaning":"- If you describe someone as (being) crude, then you disapprove of them, \n     because they speak or behave in a rude, offensive, or unsophisticated way.\n- A crude method or measurement is not exact nor precise - they're rough or sketchy.","example":"The DIY bookshelf ended up a crude masterpiece, held together by duct tape, hope and undeniably dubious engineering skills.\nThe prototype is still crude, but it's shaping up to show real potential for becoming a crowd-pleaser.\nNo one in their right mind would approve of his crude jokes - they're just so wrong on so many levels.\nThe shrine's ancient stone lanterns still show signs of crude carvings, that have been softened by centuries of moss and rain."},{"word":"vulgar","type":"adj","meaning":"- if you describe a person or their behaviour as vulgar, you mean that they lack taste or behave rudely\n- something or someone that is crude; tasteless; coarse; gross; poor quality","example":"He told a vulgar joke at dinner and instantly regretted it, as his nana gave him the \"you were raised better that this\" stare.\n\"This film is tasteless, vulgar and even badly shot!\" grumbled the obviously envious Director."},{"word":"define","type":"v","meaning":"- To show, describe, or state clearly what it is and what its limits are, or what it is like","example":"We were unable to define the problem, as we had no idea what was wrong with him.\nI asked him to define 'fashionable' and he cheekily gestured to his neon socks and Crocs combo!?\nIt is worrisome that she defines 'moderation' while pouring two extra-large bags of chips into just her bowl.\nI don't know how to define decency, however I can easily recognise that he doesn't have any such bone in his body."},{"word":"hurkle-durkle","type":"v","meaning":"- to hurkle-durkle means to lounge in bed past the point of when it's time to get up\n- to be idle in bed; to lounge about not doing anything important or useful","example":"After a long hard week of working the grind, I decided to hurkle-durkle under my blankets all Sunday morning.\nOn chilly winter mornings, nothing feels better than to hurkle-durkle before facing a tough day ahead."},{"word":"Truth or Dare","type":"n","meaning":"- Truth or Dare is a game where players are given the choice to answer a truth question or perform a dare\nThe game is typically played with two or more players, and it can be adapted for different age groups and situations","example":"Haven't you ever played \"Truth or Dare\" as a kid at a party? Wow! What have you missed out on???"},{"word":"undesirable","type":"adj","meaning":"- if you describe something or someone as undesirable, you do not want it or you think they are harmful \n- you do not desire it!","example":"Most considered him an undesirable guest as he was rude and arrogant the last time them met.\nThe summer humidity can make working at home most undesirable, when your air-con is on the blink.\nI grumbled as the cat left an undesirable gift on my bed after I forgot to feed him on time."},{"word":"at all costs","type":"phrase","meaning":"- if you say that something must be avoided at all costs, you are emphasizing that it must not be allowed to happen under any circumstances","example":"Jeff was determined to get front-row seats to the concert at all costs - even if it meant camping out days before.\nFiguring out how to finish the project without doing much of the work himself became his mission - at all costs!"},{"word":"painstakingly\npainstaking","type":"adv\nadj","meaning":"- in an extremely careful manner, esp., regarding the fine detail of the matter\n- to do somthing with a great deal of care attention and effort, often over a long period of time","example":"Indie painstakingly brushed away layers of dirt to uncover the ancient relic.\nShe had painstakingly arranged her CD tower of 1000 CD's by genre, artist and mood - only for her cheeky dog to come bounding in and knock it all over, instantly."},{"word":"admirable","type":"adj","meaning":"- An admirable quality or action is one that deserves to be praised and admired.","example":"Her dedication to volunteering every weekend is truly admirable.\nMum felt the kids showed admirable restraint by not eating the entire cake in one sitting.\nThe industrious team showed admirable dedication to get the problem solved, with 24 hours.\nLizzy ability to balance clarity and empathy in communication is truly admirable."},{"word":"fall short of","type":"pv","meaning":"- to prove to be inadequate\n- to not reach the desired or expected level, goal, standard etc.","example":"The book fell short of my expectations.\nTheir explanation for trying to swindle the old man out of his money, fell short of convincing the jury.\nIt was the most undesirable result, as she had trained so hard for the marathon, but fell short of the finishing line by 800 metres."},{"word":"persecution\npersecute","type":"n\nv","meaning":"- action to treat someone in a cruel and unfair way, especially because of someone's race, religion or political beliefs or other aspects of their identity","example":"Many people fled the country to escape religious persecution.\nHe spoke out against the persecution of gay groups, even at great personal risk.\nJohnny felt persecuted by his classmates for being different, even though he tried so hard to fit in."},{"word":"intentionally\nintention","type":"adv\nn","meaning":"- you do something with your aim of what you intend or plan to do \n- done on purpose or deliberate - it wasn't an accident - it was meant ot happen","example":"It was never my intention to hurt you, but I never knew you were such a wimp!?\nThe coach intentionally played the music extremely loud to distract the members."},{"word":"insightful\ninsight","type":"adj\nn","meaning":"- showing clear understanding of a complicated problem or situation\n- if you gain an insight (into) a complex situation or problem, you gain an accurate or deep understanding of it","example":"I hope this talk has given you some insight into the type of person I really am ...\nThe facilitator made an insightful, intentional effort to include everyone in the discussion."},{"word":"misaligned\nmisalignment","type":"adj\nn","meaning":"- not in the correct position or improperly adjusted\n- placed or positioned badly or wrongly","example":"The car's wheel were misaligned, causing it to drift slightly to the right.\nHis sporadic shopping sprees were totally misaligned with his wife's vision for saving for a deposit to put on their first home.\nThe photo frames was slightly misaligned which drove my dad bonkers, he needed to straighten all of them, perfectly, at all costs!"},{"word":"resonate","type":"v","meaning":"- to have particular meaning or importance to someone\n- echoing or connecting deeply with someone","example":"The story of how he painstakingly overcame his trauma of dating hare-brained women really resonated with the young male audience.\nThe beat of the summer drums resonated throughout my whole body!"},{"word":"write off","type":"pv","meaning":"- you accept that you are never going to get the spent money back\n- you decide that something or someone is NOT important or is useless - they're not worth serious attention","example":"Carl is fed up with people writing him off because of his size - he has many admirable qualities - like his huge appetite.\nTom quickly figured out it was quite a debacle. After being swindled he had written off any chance of getting any of it back."},{"word":"align","type":"v","meaning":"- To arrange something in the correct position or relationship - usually parallel to it.\n- To support a group, because you have the same opinion as them.","example":"The speech really resonated with him so he aligned himself to the new radical party.\nColin had tried to align his weekend plans with Zion's schedule, but the universe had other ideas.\nThe team met to align their strategies before the big prez - and to fiercely argue over the font choices and colours."},{"word":"embrace","type":"v","meaning":"- To accept an idea, a proposal, a set of beliefs, expecially when it is done with enthusiasm.\n- To hold someone tightly.","example":"After the plane miraculously landed safely, people were crying for joy, cheering and embracing each other.\nI had a hard time embracing the fact that she was giving me constructive feedback. It felt more like I was being gently roasted!?\nIn order to embrace change instead of resisting it, you need to not worry about every teeny-tiny detail.\nWomen are never taught nor allowed to embrace their imperfections, as they're still expected to hide them."},{"word":"flop","type":"n","meaning":"- something that is completely unsuccessful","example":"It may seem like a petty remark to you, but I did not appreciate hearing they thought my prez was a flop!\nThe extravagant action movie flopped at the box office - half of the theatre was empty. It was a total write off!\nThe romantic first-date dinner was a complete flop as the culinary debacle involved 2 very burnt steaks, a greedy cat and a fire alarm that resonated throughout the whole building."},{"word":"backlash","type":"n","meaning":"- A sudden, strong and negative reaction by a large number of people, against something that has been changed recently in society","example":"The company faced a fierce backlash after raising the prices tenfold without warning.\nThe new law triggered a public backlash with protests erupting across the country. It quickly escalated into riots!\nHe had mustered up the power to repeatedly apologise profusely, but the fierce backlash had already gone viral."},{"word":"fierce","type":"adj","meaning":"- showing strong feelings or a lot of activity, often in a violent way","example":"The future looked bleak, as the frivolous fashion brand received fierce backlash for its controversial ad campaign using animals."},{"word":"wrinkled","type":"adj","meaning":"- a piece of cloth (clothes) or paper that has small folds or lines that you do not want\n- having creases or crumpled","example":"We presumed it had been a really tough night, as Mark's suit looked very wrinkled. I wonder did he sleep in it, last night.\nShe pulled the wrinkled map from her pocket, hoping they could still find the nearest cafe. \nAudrey looked into the mirror and though she did indeed look older and more wrinkled than ever. It brought a cheeky smile to her content face."},{"word":"solicit","type":"v","meaning":"- to ask someone for support; help; advice; an opinion; money; or information","example":"Alaina attempted to solicit Huxley's help with her English homework by indulging him with some of her freshly-baked choc-chip bickies.\nKaz stood at the office coffee machine clutching his mug tightly, trying to solicit gossip like a caffeine-fueled detective. He was always envious of the nosey ladies who knew it all."},{"word":"dissent","type":"n\nv","meaning":"- A strong disagreement or dissatisfaction with a decision or opinion, especially one that is supported by most people or by people in authority.\n- To disagree, esp, with a commonly held opinion or an official decision.","example":"There was a growing dissent amongst the employees, as nobody approved of the misaligned new policy.\nTimmie the cat, showed his dissent by knocking every item of the shelf, even thought there was ample walking space.\nThere was loud dissent in the group chat when someone suggested replacing pizza night with salad night.\nThe kid dissented loudly when his mum told him ,he couldn't wear his P.J's to the supermarket."},{"word":"dissect\ndissection","type":"v\nn","meaning":"- To consider and talk about each detail of it or study something very closely.\n- To cut something up into much smaller pieces.","example":"Researchers need a growing supply of corpses for dissection. \nCritics are dissecting his latest work and questioning his motives. The humility he emits from taping a kakipi on the wall is not resonating with anyone. \nNancy enjoys dissecting movie plots to understand why certain scenes work or don't work.\nThe team met to dissect the data and identify the root cause of the issue, before things escalated."},{"word":"debacle","type":"n","meaning":"- An event or a situation that is considered a complete failure and causes embarrassment.","example":"The company's product launch escalated into a full-blown debacle when the mic didn't work and then, the new app crashed while live on stage.\nWould it be considered a debacle if the models walked onto the runway wearing their outfits backwards?\nThe team's playoff chance ended in a debacle as the team lost by 10 points due to an untimely error.\nAfter the debacle of the war, the world was never the same again."},{"word":"humility","type":"n","meaning":"- the quality of NOT thinking that you are better than other people (= being humble)\n- having a modest view of your own importance","example":"It takes humility to admit you were wrong and apologise sincerely.\nDespite Lee's success, she always treats others with kindness and humility. She never gets caught up in herself!\nThe ardent team accepted the award with genuine humility, thanking everyone around them instead of taking all the credit!"},{"word":"constructively\nconstructive","type":"adv\nadj","meaning":"- Something was done with useful and helpful effects rather than being negative or with no purpose.\n- Serving to build or improve something; being positive about something.","example":"After a few drinks, both parties started to realx and talk constructively about playing a major role for peace.\nAt least, I'm doing something constructively to help the group ... giving constructive criticism is no easy task!?\nLet's keep this MTG constructive - no finger-pointing, just insightful solutions!\nThe P.M. has only ostensibly promised that Israel will play a constructive role in bring peace to the Middle East."},{"word":"make it a point to","type":"pv","meaning":"-to give one's attention to (doing something) to make sure that it happens","example":"She makes it a point to treat her employees fairly.\nI make it a point to call my dad every other weekend, no matter how busy I am.\nNess likes it when her members make it a point to arrive 15 mins early.\nHe makes it a point to learn one new word in English every day."},{"word":"postmortem","type":"n","meaning":"- a discussion of an event after it has happened, especially of what was wrong with it or why it failed\n- \"after death\" in Latin\n- in a medical context ... aka autopsy","example":"After we lose a game, there's usually a post-mortem over a few too many beers.\nThe postmortem revealed that the cause of death was being poisoned.\nAfter the product launch filed, the team held a postmortem to analyse why it flopped."},{"word":"sink one's teeth into","type":"pv","meaning":"- to do or enter into something (a task; job; project; problem etc.) with great enthusiasm, concentration, conviction, etc.","example":"Lisa was thrilled to sink her teeth into something more complex, after months of easy assignments.\nThe problem was frustrating at first, but once the team put their heads together and sank their teeth into it, they came up with a brilliant solution.\nWhen I sank my teeth into the Miyazaki mango it was pure bliss. I've never tasted anything so sweet and juicy before!"},{"word":"cultivate","type":"v","meaning":"- To cultivate land or crops, you prepare land and grow crops on it.\n- To work hard to develop or improve your skills, to make them better; stronger; faster etc.\n- To develop a friendship or a relationship.","example":"The young farmers worked for months to cultivate the soil and prepare it for spring planting.\nThe CEO was successful in cultivating many networks by socialising every chance he got - perhaps at the expense of his liver.\nI don't doubt to become a brilliant leader you must cultivate empathy and resilience.\nThe international team cultivated mutual respect and trust, through their shared struggles and constant disagreements to begin with."},{"word":"abandoned","type":"adj","meaning":"- An abandoned place or building is no longer used or occupied - it's empty; deserted; forsaken ...","example":"The abandoned buildings quickly became a slum for the homeless.\nNPR developers were keen to get hold of the abandoned warehouse as they wanted to turn it into a community centre for young kids.\nThe architects abandoned their original design soon after realising it wasn't feasible and it wouldn't meet their fussy client's demands. \nI would love to dance with abandoned joy in the rain one day, but surely onlookers would think I'm mad and lock me up!!"},{"word":"profound","type":"adj","meaning":"- a profound idea, work, or person shows great intellectual depth and understanding","example":"Coming to Japan at the age of 20 had a profound effect on my life.\nI always feel a profound sense of peace while sitting on the beach watching the sunset.\nJeff's determined activism led to profound changes in how science students think about communicating in English."},{"word":"acutely","type":"adv","meaning":"- If you feel or notice something acutely, then you feel or notice it very strongly.\n- If a feeling or quality of something is acutely unpleasant, it is extremely unpleasant.\n- It is something critical; severe; quick; sharp or strong etc.","example":"Nigel was acutely aware of Nancy's body odour, but (he) was tactful enough not to mention it in front of everyone.\nNess is always acutely aware of the silences that fills a classroom, so she is determined to change that - one session at a time.\nBrad felt acutely alone after the breakup, despite being surrounded by colleagues and friends."},{"word":"detached\ndetachment","type":"adj\nn","meaning":"- Someone is not personally involved; they put distance between them. \n- The feeling that you have of not being personally involved in something or of having no emotional interest in it.","example":"Simon tries to remain emotionally detached from the group because he fears being rejected or misunderstood.\nI prefer to constantly chat with dentists and doctors, so they cannot remain detached.\nA judge must maintain strict detachment when reviewing the evidence for a trial.\nBy asking everyone to maintain a degree of detachment can help diverse teams navigate conflict more constructively."},{"word":"exacerbate","type":"v","meaning":"- To make a problem, a bad situation or feeling, even worse.","example":"His comments only served to exacerbate the tension.\nScratching the rash will only exacerbate it - stop it!!\nIgnoring trivial problems can exacerbate them over time, so don't hold them in, let them all out.\nEvidently, when his family left him, the echo of the empty rooms exacerbated his sense of loneliness."},{"word":"inducements","type":"noun","meaning":"Things that persuade or encourage someone to do something","example":"The company offered several inducements to attract new employees."},{"word":"daunting","type":"adj","meaning":"- Seemingly difficult to deal with; intimidating for someone to do or overcome.\n- Something that makes you feel slightly afraid or worried about dealing with it.","example":"Starting a new job in a foreign country can be daunting.\nThe new President was faced with the daunting task of restoring the country after their predecessor had ruined everything.\nTo suddenly take on a lot of responsibility can be quite daunting for many people.\nTo walk thru the thick fog to the inner part of the shrine was daunting for the tourists."},{"word":"futile","type":"adj","meaning":"Incapable of producing any useful result; pointless","example":"All attempts to fix the old car proved futile."},{"word":"at stake","type":"phrase","meaning":"- At risk; or in danger of being lost or affected by a decision.\n- If you're not successful, that something may be lost; damaged etc.","example":"Thousands of jobs are at stake if the factory closes.\nWith so much at stake, the team vowed to protect the project at all costs. They believed it was worth fighting for.\nDonni knew his legacy was at stake, so he lied through his teeth, to defend himself at all costs.\nThe team were determined to succeed in their research at all costs, as their future was at stake. They could not continue without funding."},{"word":"scorcher","type":"noun","meaning":"An extremely hot day","example":"Yesterday was a real scorcher — it hit 40°C in the afternoon!"},{"word":"rear its ugly head","type":"idiom","meaning":"- if something unpleasant rears its head or rears its ugly head, it becomes blatantly visible or clearly noticeable","example":"The data breach reared its ugly head again, just when the team thought the issue had been resolved.\nFor most students, self-doubt rears its ugly head regularly. Confidence is the biggest hurdle to overcome.\nJelousy & envy, for most men, rears its ugly head every time a successful & independant woman talks about her success."},{"word":"astronomical","type":"adj","meaning":"- The amount or cost of something that is extremely high or large.\n- An exorbitant amount of something.\n - Used to describe something that is huge, often surprisingly or excessively so.","example":"The cost of rent in the heart of Tokyo is becoming astronomical. Many people are opting to move out into the countryside.\nAs the fierce heat persists, vegetables are reaching astronomical prices.\nKody must have thought he was feeding an army, as he made an astronomical amount of pasta. Needless to say there was a lot of leftovers for the following week.\nPatrick's ego and his bar tab were both astronomical. He delighted in cultivating such a wild reputation."},{"word":"persist","type":"v","meaning":"- to continue to do something, even though it may be hard, tricky or other people are against it","example":"Marissa persists on having an astronomical snack collection on standby - from chips to kakipi to choccie, she has every flavour known to humankind.\nWhy do right-wing political parties persist in trying to increase defence spending tenfold, when there are more pressing issues that need to be solved.\n\"You haven't answered me!\" she persisted. \"There's a lot at stake here and we need a concrete decision\" she grumbled."},{"word":"curb","type":"v\nn","meaning":"- To try and control something, to keep it within the limits set for something.\n- To keep your emotions under control.","example":"The activists persistently called for energy consumption to be curbed, however, in this intense heatwave, it would be lethal to do so.\nThe company coerced all employees to abide by the rules to curb unnecessary overtime.\nSue tried to curb her spending after checking her bank balance and noticed she was completely in the red.\nKody couldn't curb his excitement when the new game began and he started winning."},{"word":"fierce","type":"adj","meaning":"- showing strong feelings or a lot of activity, often in a violent way","example":"The future looked bleak, as the frivolous fashion brand received fierce backlash for its controversial ad campaign using animals.\nThe new political candidates gave fierce speeches that left half their audience electrified and the other half mortified.\nThe debate grew fierce and exhilirating as opposing sides clashed over the terminology.\nFierce instincts are often the difference between life and death, in the wild."},{"word":"alleged","type":"adj","meaning":"- Something said without any proof, that is supposed to be true.\n- An alleged fact has been stated, but has NOT been proven to be true.","example":"The alleged thief was arrested last night.\nAlysa completely denied the alleged wrongdoing and her team and manager affirmed her integrity.\nThe drunk man riding his bike allegedly struck the elderly woman as she was crossing a street.\nThe alleged cure-all medicine produced no real results when reputable doctors tested it on hundreds of patients."},{"word":"exorbitant","type":"adj","meaning":"- Something that's unreasonably high (usually in price or cost).","example":"The outrage was caused as the hotel charges foreigners an exorbitant fee, during the holidays.\nThe amusement park imposes an exorbitant fee specifically to those who don't want to waste time standing in line.\nIt can feel pretty unfair, when you've been coerced into paying an exorbitant amount of dough, for something you don't like in particular.\nTo make matters worse, the restaurant charged an exorbitant price for the course, that came with an excessive amount of hidden fees and very little taste."},{"word":"acreage","type":"n","meaning":"- A large area of land, typically measured in acres","example":"The farm covers over 100 acres of rich, fertile acreage.\nThe real estate agent listed the property as having generous acerage in a quiet surrounding.\nThe bushfire spread rapidly destroying thousands of acres of forest acerage, overnight.\nThe report details the acreage required for the proposed detention centre."},{"word":"abolished","type":"v","meaning":"- To formally put an end to (a system, practice, or institution)","example":"Slavery was abolished in the 19th century.\nThe committee proposed to abolish the outrageous law after years of debate, yet it still has not been passed.\nOnly a few activists work tirelessly to try and abolish practises of discrimination against immigrants."},{"word":"incentivize","type":"v","meaning":"To encourage or motivate with incentives","example":"The company aims to incentivize employees with performance bonuses."},{"word":"pivot","type":"v","meaning":"To turn or shift direction; a central point on which something turns","example":"The company had to pivot its strategy during the crisis."},{"word":"laden with","type":"V\nn","meaning":"Heavily loaded with something","example":"The truck was laden with fresh produce."},{"word":"inevitably","type":"adj","meaning":"Unavoidably; as is certain to happen","example":"Inevitably, delays occurred due to the weather."},{"word":"hinder","type":"v","meaning":"To obstruct or delay progress","example":"Poor communication can hinder productivity."},{"word":"entrenched","type":"adj","meaning":"- Something that is firmly established and difficult to change.","example":"Gender roles are still deeply entrenched in most societies in Japan.\nThe routine became entrenched after years and years and years of doing it the same way.\nTheir biased opinions were so deeply entrenched, the discussion went absolutely nowhere.\nOnce a belief becomes entrenched, it can shape the public's view for decades."},{"word":"elusive","type":"adj","meaning":"- Something that's difficult to find, catch, describe, remember or achieve.","example":"The solution to the problem remains elusive, even though the team worked tirelessly to try and solve it.\nTrue alignment between teams can be elusive without good communication and constant collaboration.\nThe sweet subtle scent of early plum blossoms were elusive, delicately drifting in and out of the chilly air.\nNess is always in search of an elusive and complex flavour of a truly unique local 'sake'."},{"word":"ad-hoc","type":"adj","meaning":"- something is formed or done for a particular purpose as necessary, but it's usually temporary or improvised\n- something that is created; arranged or done, but it's not part of a long-term plan","example":"They formed an ad-hoc committee to address the issue, quickly.\nThe team held an ad-hoc meeting to try and address the sudden problem.\nThe solution was ad-hoc, but it worked for the time being.\nThe plan was ad-hoc, thrown together from whatever ideas they could come up with on the spot."},{"word":"bolster","type":"v","meaning":"- To support or strengthen someone or something.","example":"Having a banana can really bolster your energy in the afternoon.\nHer confidence was bolstered by the positive feedback.\nThe team really need to bolster their argument by providing more evidence.\nThe government completely failed to bolster the economy by recklessly applying tariffs."},{"word":"deteriorate\ndeterioration","type":"v\nn","meaning":"- To become worse in some way, over time.\n- The act of deteriorating.","example":"His health deteriorated rapidly after the accident.\nBeing addicted to harmful substances will rapidly deteriorate your health.\nRelying on abusive substances often accelerates the deterioration of your well-being.\nWe could see the deterioration in the weather, as menancing dark clouds gathered in the blink of an eye."},{"word":"discontent","type":"n\nadj","meaning":"- A feeling of dissatisfaction or unhappiness with a situation.\n- To be dissatisfied with something or someone.","example":"The workers expressed their discontent with the new policy, it seemed very unfair.\nThere are reports of widespread discontent with the way the war is being mishandled.\nJeff's dramatic sighs made his discontent so subtle - almost impossible to notice.\nTheir discreet discontent was genuinely shocking, no one could have ever guessed they didn't enjoy volunteering for free."},{"word":"undermine","type":"v","meaning":"- to make something less strong or less secure than it was before, often gradually\n- if you undermine someone's authority or position, you make their authority or position weaker, usually by indirect ways","example":"Offering too much advice for every little problem will undermine a teenager's feeling of becoming an adult.\nChaney felt his efforts were being undermined by his passive-agressive boss.\nRadical right-wing political leaders are constantly trying to undermine the current government's policy.\nDoubt undermined his resolve like ivy creeping through stone."},{"word":"depleted\ndeplete","type":"adj\nv","meaning":"- Something that is reduced or exhausted - usually on purpose.\n- To deplete a stock or an amount of something means to lessen it or to make it so there's nothing left.","example":"The foolish soldiers got spooked by the sound and depleted their ammunition in just one round.\nWithout a lot of rainfall, the dams were quickly depleted of water.\nOverfishing has depleted marine populations in that region, so the cost of fish are exorbitant currently.\nThe fierce and intense discussion completely depleted my mental energy."},{"word":"blunder","type":"n\nv","meaning":"- A blunder is a stupid or careless mistake.\n- To blow it; or to make a foolish mistake.","example":"The company's decision to ignore the feedback turned out to be a major blunder. It cost them millions of dollars and undermined their reputation greatly.\nHe blundered through the negotiation, and ended up giving away more than he had intended.\nNo doubt Shane had blundered again, as he didn't realise Raylee was the president's daughter when he bad-mouthed the company.\nOne critical blunder can change the fate of your life forever, when you don't know how to respect women.\nOops!! I made a fateful culinary blunder by accidently swapping the salt for sugar!"},{"word":"reservation","type":"n","meaning":"- if you have reservations about something, you are not sure that it is entirely good or right","example":"I told him my main reservation about his film was the ending - it wouldn't sit right with a nit-picky audience.\nAfter three weeks, the strikers' demands were met almost without reservation.\nAllison accepted his proposal but with some reservations. She couldn't tell if he was profoundly naive or just hare-brained.\nMany people have a mixture of reservations and excitement when moving to a big city, like Tokyo."},{"word":"vine","type":"n","meaning":"- a vine is a plant that grows up or creeps over things, like rocks, especially one which produces grapes, or ivy\n- if you learn or hear something on the grapevine it's usually a casual conversation ...","example":""},{"word":"witchhunt","type":"n","meaning":"- q witch-hunt is an attempt to find and punish a particular group of people who are being blamed for something, often simply because of their opinions and not because they have actually done anything wrong","example":"After the data was leaked, management launched a witch-hunt to find someone to blame.\nSocial media can quickly turn into a witch-hunt when rumours start spreading."},{"word":"compassionate","type":"adj","meaning":"- If you describe someone or something as being compassionate, you mean that they feel or show pity, sympathy, and understanding for people who are suffering.","example":"Our new manager seems to take a more compassionate approach when discussing the team's challenges, compared to our previously snarky boss.\nResearch clearly indicates that compassionate behaviour is the fastest way to strengthen social bonds.\nLily's voice carries a genuinely compassionate softness that makes people feel safe, immediately.\nDavid's compassionate response made the entire situation feel a lot less overwhelming and encouraged everyone to be a little less judgmental."},{"word":"empathetic\nempathy","type":"adj\nn","meaning":"- Someone who has the ability to share another person's feelings or emotions, as if they were their own.","example":"Customer service improves dramatically when staff practise empathy.\nThe workshop also focuses on building empathy in cross-cultural communic
